<script type="module">

import { db } from "./js/firebase-config.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const type = localStorage.getItem("partnerType");

window.submitForm = async (e)=>{
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    aadhaar: document.getElementById("aadhaar").value,
    pan: document.getElementById("pan").value,
    partnerType: type,
    plan: localStorage.getItem("planPrice"),
    status: "KYC Done",
    createdAt: Date.now()
  };

  try{
    const docRef = await addDoc(collection(db,"partners"), data);

    // 🔥 MOST IMPORTANT
    localStorage.setItem("partnerId", docRef.id);

    window.location.href = "partner-from.html";

  }catch(err){
    alert("Error: " + err.message);
  }
};

</script>
