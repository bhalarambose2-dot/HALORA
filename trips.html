<!-- =========================
HALORA TRIPS SECTION START
========================= -->
<section id="tripsSection" class="page-section" style="display:none;">
  <div class="trips-hero">
    <h2>Explore Trips ✈️</h2>
    <p>All India budget trips under ₹10,000 per person</p>

    <div class="trip-search-box">
      <span>🔍</span>
      <input type="text" id="tripSearchInput" placeholder="Search Goa, Jaipur, Kashmir..." />
    </div>
  </div>

  <div class="trips-wrapper">
    <div class="trips-title-row">
      <h3>Where You Should Go Next?</h3>
      <button class="trip-view-all-btn" onclick="scrollTripsTop()">View All</button>
    </div>

    <div class="trip-filters" id="tripFilters">
      <button class="trip-filter-btn active" data-filter="All">All</button>
      <button class="trip-filter-btn" data-filter="Hill">Hill</button>
      <button class="trip-filter-btn" data-filter="Religious">Religious</button>
      <button class="trip-filter-btn" data-filter="Couple">Couple</button>
      <button class="trip-filter-btn" data-filter="Family">Family</button>
      <button class="trip-filter-btn" data-filter="Beach">Beach</button>
      <button class="trip-filter-btn" data-filter="Heritage">Heritage</button>
      <button class="trip-filter-btn" data-filter="Adventure">Adventure</button>
    </div>

    <div id="tripGrid" class="trip-grid"></div>
    <div id="tripEmptyState" class="trip-empty-state">No trips found 😕</div>
  </div>
</section>

<!-- TRIP DETAILS MODAL -->
<div class="trip-modal" id="tripModal">
  <div class="trip-modal-content" id="tripModalContent"></div>
</div>
<!-- =========================
HALORA TRIPS SECTION END
========================= -->
