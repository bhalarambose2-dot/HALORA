<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Trip Explorer - HD Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .filter-bar {
            background: white;
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filter-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            background: #f0f0f0;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: scale(1.05);
        }

        .filter-btn:hover {
            transform: translateY(-2px);
        }

        .price-filter-row {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .price-slider {
            flex: 2;
            min-width: 200px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #764ba2;
            border-radius: 50%;
            cursor: pointer;
        }

        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 80%;
            max-width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            outline: none;
        }

        .trip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .trip-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .trip-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        .trip-image {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.3s;
        }

        .trip-card:hover .trip-image {
            transform: scale(1.02);
        }

        .region-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        .price-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .trip-content {
            padding: 20px;
        }

        .trip-title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }

        .trip-duration {
            color: #666;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .trip-destinations {
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .price-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .price-item {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            background: #f8f8f8;
            border-radius: 10px;
        }

        .price-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        .price-value {
            font-weight: bold;
            font-size: 14px;
        }

        .price-value.budget { color: #28a745; }
        .price-value.mid { color: #ff9800; }
        .price-value.luxury { color: #9c27b0; }

        .book-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .book-btn:hover {
            opacity: 0.9;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {

            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .modal-body {
            padding: 20px;
        }

            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .close-modal:hover {
            opacity: 0.8;
        }

            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .submit-booking {
            background: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
            font-size: 13px;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .trip-grid {
                grid-template-columns: 1fr;
            }
            .filter-bar {
                border-radius: 20px;
            }
            .header h1 {

            }
        }

        .no-results {
            text-align: center;
            color: white;
            padding: 50px;
            font-size: 1.2rem;
        }
    </style>
</head>
