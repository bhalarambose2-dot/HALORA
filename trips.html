<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Trip Explorer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .filter-bar {
            background: white;
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            background: #f0f0f0;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .price-filter-row {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .price-slider {
            flex: 2;
            min-width: 200px;
        }

        input[type="range"] {
            width: 100%;
        }

        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 80%;
            max-width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
        }

        .trip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .trip-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .trip-card:hover {
            transform: translateY(-5px);
        }

        .trip-image {
            height: 160px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .trip-content {
            padding: 20px;
        }

        .trip-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .trip-duration {
            color: #666;
            font-size: 13px;
        }

        .trip-destinations {
            font-size: 13px;
            color: #555;
            margin: 10px 0;
        }

        .price-row {
            display: flex;
            gap: 8px;
            margin: 15px 0;
        }

        .price-item {
            flex: 1;
            text-align: center;
            padding: 6px;
            background: #f8f8f8;
            border-radius: 8px;
            font-size: 12px;
        }

        .price-value {
            font-weight: bold;
        }

        .price-value.budget { color: #28a745; }
        .price-value.mid { color: #ff9800; }
        .price-value.luxury { color: #9c27b0; }

        .book-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .modal-body {
            padding: 20px;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .submit-booking {
            background: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .trip-grid { grid-template-columns: 1fr; }
            .filter-bar { border-radius: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🇮🇳 India Trip Explorer</h1>
    <p>50+ Tours | Booking Available | Price Filter</p>
</div>

<div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All Trips</button>
    <button class="filter-btn" data-filter="North">🏛️ North</button>
    <button class="filter-btn" data-filter="Hill">🏔️ Hill</button>
    <button class="filter-btn" data-filter="West">🌊 West</button>
    <button class="filter-btn" data-filter="South">🌴 South</button>
    <button class="filter-btn" data-filter="East">🐅 East</button>
</div>

<div class="price-filter-row">
    <span>💰 Max Budget:</span>
    <div class="price-slider">
        <input type="range" id="priceSlider" min="0" max="50000" step="500" value="50000">
    </div>
    <span id="priceValue">₹50,000+</span>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Search trip...">
</div>

<div class="trip-grid" id="tripGrid"></div>

<div class="footer">
    ✨ Prices are per person (2 Nights/3 Days package) | Taxes extra | Best season: Oct-Mar
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close-modal">&times;</span>
            <h2 id="modalTripName">Book Trip</h2>
        </div>
        <div class="modal-body">
            <form id="bookingForm">
                <input type="hidden" id="bookTripId">
                <input type="text" id="userName" placeholder="Full Name" required>
                <input type="email" id="userEmail" placeholder="Email" required>
                <input type="tel" id="userPhone" placeholder="Phone" required>
                <input type="number" id="travelers" placeholder="Number of travelers" min="1" value="1">
                <input type="date" id="travelDate">
                <select id="priceTier">
                    <option value="budget">Budget</option>
                    <option value="mid">Mid-Range</option>
                    <option value="luxury">Luxury</option>
                </select>
                <button type="submit" class="submit-booking">Confirm Booking</button>
            </form>
            <p id="bookingMessage" style="margin-top:10px; text-align:center;"></p>
        </div>
    </div>
</div>

        {id:38,name:"Ooty",region:"South",duration:"2N/3D",budget:4000,mid:8500,luxury:19000,destinations:"Ooty Lake",photo:"🚂"},
        {id:39,name:"Kodaikanal",region:"South",duration:"2N/3D",budget:4000,mid:8500,luxury:19000,destinations:"Coaker's Walk",photo:"🌲"},
        {id:40,name:"Mysore Coorg",region:"South",duration:"3N/4D",budget:5500,mid:11000,luxury:25000,destinations:"Mysore Palace",photo:"🏰"},
        {id:41,name:"Hampi",region:"South",duration:"2N/3D",budget:4000,mid:8000,luxury:18000,destinations:"Stone Chariot",photo:"🗿"},
        {id:42,name:"Pondicherry",region:"South",duration:"2N/3D",budget:3500,mid:7500,luxury:17000,destinations:"Promenade Beach",photo:"🇫🇷"},
        {id:43,name:"Chennai",region:"South",duration:"2N/3D",budget:3500,mid:7000,luxury:16000,destinations:"Shore Temple",photo:"🏛️"},
        {id:44,name:"Kanyakumari",region:"South",duration:"2N/3D",budget:3000,mid:6000,luxury:14000,destinations:"Vivekananda Rock",photo:"🌅"},
        {id:45,name:"Andaman",region:"South",duration:"5N/6D",budget:15000,mid:30000,luxury:65000,destinations:"Radhanagar Beach",photo:"🏝️"},
        {id:46,name:"Khajuraho",region:"East",duration:"2N/3D",budget:4000,mid:8500,luxury:19000,destinations:"Temples",photo:"🛕"},
        {id:47,name:"Bandhavgarh",region:"East",duration:"2N/3D",budget:5500,mid:11000,luxury:26000,destinations:"Tiger Safari",photo:"🐅"},
        {id:48,name:"Kanha",region:"East",duration:"2N/3D",budget:5500,mid:11000,luxury:26000,destinations:"Jungle Safari",photo:"🦌"},
        {id:49,name:"Konark Puri",region:"East",duration:"2N/3D",budget:3500,mid:7000,luxury:16000,destinations:"Sun Temple",photo:"☀️"},
        {id:50,name:"Bodhgaya",region:"East",duration:"2N/3D",budget:3000,mid:6500,luxury:15000,destinations:"Mahabodhi",photo:"🪷"}
    ];

    let currentFilter = "all";
    let currentSearch = "";
    let maxPrice = 50000;

    const tripGrid = document.getElementById("tripGrid");
    const searchInput = document.getElementById("searchInput");
    const priceSlider = document.getElementById("priceSlider");
    const priceValueSpan = document.getElementById("priceValue");

    function getFilteredTrips() {
        let filtered = tripsData;
        if (currentFilter !== "all") filtered = filtered.filter(t => t.region === currentFilter);
        if (currentSearch.trim()) {
            const term = currentSearch.toLowerCase();
            filtered = filtered.filter(t => t.name.toLowerCase().includes(term) || t.destinations.toLowerCase().includes(term));
        }
        filtered = filtered.filter(t => t.mid <= maxPrice);
        return filtered;
    }

    function renderTrips() {
        const filtered = getFilteredTrips();
        if (filtered.length === 0) {
            tripGrid.innerHTML = '<div style="color:white;text-align:center;padding:50px;">❌ No trips found</div>';
            return;
        }
        tripGrid.innerHTML = filtered.map(trip => `
            <div class="trip-card">
                <div class="trip-image">${trip.photo}</div>
                <div class="trip-content">
                    <div class="trip-title">${trip.name}</div>
                    <div class="trip-duration">📅 ${trip.duration}</div>
                    <div class="trip-destinations">📍 ${trip.destinations}</div>
                    <div class="price-row">
                        <div class="price-item"><div>BUDGET</div><div class="price-value budget">₹${trip.budget.toLocaleString()}</div></div>
                        <div class="price-item"><div>MID</div><div class="price-value mid">₹${trip.mid.toLocaleString()}</div></div>
                        <div class="price-item"><div>LUXURY</div><div class="price-value luxury">₹${trip.luxury.toLocaleString()}</div></div>
                    </div>
                    <button class="book-btn" data-id="${trip.id}">📅 Book Now</button>
                </div>
            </div>
        `).join("");
        document.querySelectorAll('.book-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openBooking(parseInt(btn.dataset.id));
            });
        });
    }

    // Booking Modal
    const modal = document.getElementById("bookingModal");
    function openBooking(tripId) {
        const trip = tripsData.find(t => t.id === tripId);
        if (!trip) return;
        document.getElementById("modalTripName").innerText = `Book: ${trip.name}`;
        document.getElementById("bookTripId").value = tripId;
        modal.style.display = "flex";
        document.getElementById("bookingMessage").innerHTML = "";
    }
    function closeModal() { modal.style.display = "none"; }
    document.querySelector(".close-modal").onclick = closeModal;
    window.onclick = function(e) { if (e.target === modal) closeModal(); };
    document.getElementById("bookingForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const name = document.getElementById("userName").value.trim();
        if (!name) { document.getElementById("bookingMessage").innerHTML = "❌ Enter name"; return; }
        document.getElementById("bookingMessage").innerHTML = "✅ Booking confirmed! We'll contact you.";
        setTimeout(closeModal, 2000);
    });

    // Filters
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            renderTrips();
        });
    });
    searchInput.addEventListener("input", (e) => { currentSearch = e.target.value; renderTrips(); });
    priceSlider.addEventListener("input", function() {
        maxPrice = parseInt(this.value);
        priceValueSpan.innerText = maxPrice === 50000 ? "₹50,000+" : `₹${maxPrice.toLocaleString()}`;
        renderTrips();
    });
    renderTrips();
</script>
</body>
</html>
