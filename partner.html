<!DOCTYPE html>
<html>
<head>
<title>Partner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0b0f19,#121a2f);
color:white;
text-align:center;
}

h2{margin-top:30px;}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.type{background:#1f2a44;}
.plan1{background:#00c853;}
.plan2{background:#2962ff;}
.plan3{background:gold;color:black;}

button:hover{transform:scale(1.08);}

.active{
border:2px solid #00ffcc;
box-shadow:0 0 10px #00ffcc;
}
</style>

</head>

<body>

<h2>Become Partner</h2>

<button class="type" onclick="setType(this,'driver')">Bike Rider</button>
<button class="type" onclick="setType(this,'hotel')">Hotel Owner</button>
<button class="type" onclick="setType(this,'trip')">Trip Agent</button>

<h2>Select Plan</h2>

<button class="plan1" onclick="selectPlan(this,299)">₹299</button>
<button class="plan2" onclick="selectPlan(this,699)">₹699</button>
<button class="plan3" onclick="selectPlan(this,1299)">₹1299</button>

<script>
let tbtn,pbtn;

function setType(btn,type){
localStorage.setItem("partnerType",type);
if(tbtn)tbtn.classList.remove("active");
btn.classList.add("active");
tbtn=btn;
}

function selectPlan(btn,price){
if(!localStorage.getItem("partnerType")){
alert("Select type first");
return;
}
localStorage.setItem("planPrice",price);
if(pbtn)pbtn.classList.remove("active");
btn.classList.add("active");
pbtn=btn;

setTimeout(()=>window.location="partner-form.html",500);
}
</script>

</body>
</html>
