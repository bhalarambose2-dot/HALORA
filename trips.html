<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BR Trip Dashboard</title>

  <style>
    body{
      margin:0;
      font-family:Poppins;
      background:#0b0f19;
      color:#fff;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111827;
      font-size:20px;
      font-weight:bold;
    }

    .container{
      padding:15px;
    }

    .btn{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#00c896;
      color:#fff;
      cursor:pointer;
      margin:5px 0;
    }

    .card{
      background:#131b2d;
      padding:15px;
      border-radius:12px;
      margin-bottom:10px;
    }

    input{
      width:100%;
      padding:10px;
      margin:5px 0;
      border-radius:8px;
      border:none;
    }

    .hidden{
      display:none;
    }

  </style>
</head>

<body>

<header>✈️ BR Trip Dashboard</header>

<div class="container">

  <!-- ADD TRIP -->
  <h3>Add New Trip</h3>
  <input type="text" id="title" placeholder="Trip Title">
  <input type="text" id="price" placeholder="Price">
  <input type="text" id="location" placeholder="Location">
  <button class="btn" onclick="addTrip()">Add Trip</button>

  <hr>

  <!-- TRIP LIST -->
  <h3>Available Trips</h3>
  <div id="tripList"></div>

  <hr>

  <!-- BOOKINGS -->
  <h3>Bookings</h3>
  <div id="bookingList"></div>

</div>

<!-- Firebase -->
<script type="module" src="trip.js"></script>

</body>
</html>
