<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HALORA Hotel Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background: #050816;
      color: white;
      font-family: Arial, sans-serif;
      margin: 0;
      padding-bottom: 90px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      background: rgba(0,0,0,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
    }

    .logo small {
      display: block;
      font-size: 12px;
      color: #aaa;
      font-weight: 400;
    }

    .logout-btn {
      background: orange;
      border: none;
      color: black;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(255,140,0,0.35);
    }

    .container {
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .hero-card,
    .balance-card,
    .card,
    .booking-card {
      background: linear-gradient(145deg, rgba(14,20,45,0.95), rgba(8,10,22,0.95));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.28);
    }

    .hero-card h2,
    .section-title {
      margin-top: 0;
    }

    .stats-grid,
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card,
    .quick-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 18px;
    }

    .stat-card h3 {
      margin: 0;
      font-size: 28px;
      color: orange;
    }

    .stat-card p {
      margin: 8px 0 0;
      color: #bbb;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: white;
      font-size: 15px;
      box-sizing: border-box;
    }

    button.main-btn {
      width: 100%;
      background: orange;
      color: black;
      border: none;
      padding: 14px;
      margin-top: 14px;
      border-radius: 14px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255,140,0,0.25);
    }

    .booking-card h4 {
      margin: 0 0 8px;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-top: 8px;
    }

    .pending { background: #3b2f05; color: #ffd86b; }
    .approved { background: #0f3d22; color: #7bffae; }
    .cancelled { background: #4a1111; color: #ff9b9b; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 700px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="logo">
      HALORA HOTEL
      <small>Hotel Partner Dashboard</small>
    </div>
    <button class="logout-btn" onclick="logoutUser()">Logout</button>
  </header>

  <main class="container">

    <section class="hero-card">
      <h2>Manage your hotel with HALORA</h2>
      <p>Update hotel details, room price, and see booking requests in one place.</p>
    </section>

    <div class="stats-grid">
      <div class="stat-card">
        <h3 id="totalHotelBookings">0</h3>
        <p>Total Bookings</p>
      </div>
      <div class="stat-card">
        <h3 id="activeHotelStatus">Inactive</h3>
        <p>Hotel Status</p>
      </div>
      <div class="stat-card">
        <h3>₹<span id="roomPriceView">0</span></h3>
        <p>Room Price</p>
      </div>
      <div class="stat-card">
        <h3 id="hotelCityView">-</h3>
        <p>City</p>
      </div>
    </div>

    <h2 class="section-title">Hotel Details</h2>
    <section class="card">
      <input type="text" id="hotelName" placeholder="Hotel Name" />
      <input type="text" id="hotelCity" placeholder="City" />
      <input type="number" id="roomPrice" placeholder="Room Price ₹" />
      <textarea id="hotelDescription" rows="4" placeholder="Hotel Description"></textarea>

      <div class="grid-2">
        <select id="hotelStatus">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>

        <input type="text" id="hotelImage" placeholder="Hotel Image URL (optional)" />
      </div>

      <button class="main-btn" id="saveHotelBtn">Save Hotel Details</button>
    </section>

    <h2 class="section-title">Hotel Bookings</h2>
    <div id="hotelBookingsList"></div>

  </main>

  <script type="module" src="./js/auth.js"></script>
  <script type="module" src="./hotel-dashboard.js"></script>
</body>
</html>
