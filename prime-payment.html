<!DOCTYPE html>
<html>

<head>
<style>
body{
margin:0;
background:linear-gradient(#0b0f19,#121a2f);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Poppins;
}

.box{
background:#131b2d;
padding:25px;
border-radius:15px;
text-align:center;
width:90%;
max-width:350px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.pay{
background:#00c853;
color:white;
}

#timer{
margin-top:15px;
color:#00ffcc;
font-size:18px;
display:none;
}
</style>
</head>

<body>

<div class="box">

<h2 id="amount"></h2>

<button class="pay" onclick="payNow()">Pay Now</button>

<div id="timer">Waiting: 30s</div>

</div>

<script type="module">

import { db } from "./js/firebase-config.js";
import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const amount = localStorage.getItem("planPrice") || 299;
document.getElementById("amount").innerText = "Pay ₹" + amount;

let count = 30;
let interval;

// 🔥 PAY + TIMER
window.payNow = ()=>{

  // UPI open
  window.location.href =
  `upi://pay?pa=cedarjs@ibl&pn=HALORA&am=${amount}&cu=INR`;

  // timer show
  const timerEl = document.getElementById("timer");
  timerEl.style.display = "block";

  interval = setInterval(async ()=>{

    count--;
    timerEl.innerText = "Waiting: " + count + "s";

    if(count <= 0){
      clearInterval(interval);

      // 🔥 auto update payment
      const id = localStorage.getItem("partnerId");

      if(id){
        await updateDoc(doc(db,"partners",id),{
          status:"KYC + Payment Pending",
          paymentTime:Date.now()
        });
      }

      // redirect
      window.location.href = "payment-success.html";
    }

  },1000);
};

</script>

</body>
</html>
