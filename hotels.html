<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HALORA HOTELS - Live Partners</title>
    <style>
        <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="header">
    <h1>🏨 HALORA HOTELS</h1>
    <p>Live hotel partners across India</p>
    <button class="partner-btn" onclick="window.location.href='partner.html'">➕ Become a Partner</button>
</div>

<div class="search-section">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search hotel or city..." onkeyup="loadHotels()">
        <button onclick="loadHotels()">🔍 Search</button>
    </div>
</div>

<div id="hotelsGrid" class="hotels-grid">
    <div class="loading">🔄 Loading hotels from partners...</div>
</div>

<script>
    // 🔥 REAL-TIME DATABASE (LocalStorage + Demo)
    let hotels = [];
    
    // Load hotels from storage
    function loadHotels() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        // Get hotels from localStorage (partners add karte hain)
        const storedHotels = localStorage.getItem('halora_hotels');
        
        if(storedHotels) {
            hotels = JSON.parse(storedHotels);
        } else {
            // Demo hotels (agar koi partner nahi hai toh)
            hotels = [
                {
                    id: 1,
                    name: "Taj Mahal Palace",
                    city: "Mumbai",
                    location: "Colaba",
                    price: 15000,
                    image: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400",
                    partner: "HALORA Official",
                    contact: "partner@halora.com",
                    available: true
                },
                {
                    id: 2,
                    name: "Oberoi Grand",
                    city: "Kolkata",
                    location: "Chowringhee",
                    price: 11000,
                    image: "https://images.unsplash.com/photo-1584132967334-10e028bd69f7?w=400",
                    partner: "HALORA Official",
                    contact: "partner@halora.com",
                    available: true
                }
            ];
            saveHotels();
        }
        
        // Filter hotels
        let filtered = hotels.filter(h => h.available === true);
        
        if(searchTerm) {
            filtered = filtered.filter(h => 
                h.name.toLowerCase().includes(searchTerm) || 
                h.city.toLowerCase().includes(searchTerm) ||
                h.location.toLowerCase().includes(searchTerm)
            );
        }
        
        displayHotels(filtered);
    }
    
    // Display hotels
    function displayHotels(hotelsList) {
        const grid = document.getElementById('hotelsGrid');
        
        if(hotelsList.length === 0) {
            grid.innerHTML = '<div class="loading">❌ No hotels found. Be the first partner!</div>';
            return;
        }
        
        grid.innerHTML = hotelsList.map(hotel => `
            <div class="hotel-card" onclick="bookHotel(${hotel.id})">
                <div class="hotel-image" style="background-image: url('${hotel.image}')">
                    <div class="hotel-price">₹${hotel.price.toLocaleString()}/night</div>
                </div>
                <div class="hotel-info">
                    <div class="hotel-name">
                        ${hotel.name}
                        <span class="partner-badge">👥 ${hotel.partner}</span>
                    </div>
                    <div class="hotel-location">📍 ${hotel.location}, ${hotel.city}</div>
                    <button class="book-btn">Book Now →</button>
                </div>
            </div>
        `).join('');
    }
    
    // Save hotels to storage
    function saveHotels() {
        localStorage.setItem('halora_hotels', JSON.stringify(hotels));
    }
    
    // Book hotel
    function bookHotel(hotelId) {
        const hotel = hotels.find(h => h.id === hotelId);
        alert(`🏨 Booking Request Sent!\n\nHotel: ${hotel.name}\nPartner: ${hotel.partner}\n\nYou will receive confirmation shortly.`);
    }
    
    // Auto-refresh every 5 seconds (real-time update)
    setInterval(() => {
        loadHotels();
    }, 5000);
    
    // Initial load
    loadHotels();
</script>
</body>
</html>
