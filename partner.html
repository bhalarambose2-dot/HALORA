<!DOCTYPE html>
<html>
<body style="background:#0b0f19;color:white;text-align:center;">

<h2>Become Partner</h2>

<button onclick="setType('driver')">Bike Rider</button>
<button onclick="setType('hotel')">Hotel Owner</button>
<button onclick="setType('trip')">Trip Agent</button>

<h2>Select Plan</h2>

<button onclick="selectPlan(299)">₹299</button>
<button onclick="selectPlan(699)">₹699</button>
<button onclick="selectPlan(1299)">₹1299</button>

<script>
function setType(type){
  localStorage.setItem("partnerType", type);
}

function selectPlan(price){
  if(!localStorage.getItem("partnerType")){
    alert("Select partner type first");
    return;
  }

  localStorage.setItem("planPrice", price);
  window.location.href = "partner-form.html";
}
</script>

</body>
</html>
