<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Withdraw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .box {
      max-width: 450px;
      margin: auto;
      background: #1e293b;
      padding: 24px;
      border-radius: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #8b5cf6;
      color: white;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>🏦 Withdraw Money</h1>

    <input type="number" id="withdrawAmount" placeholder="Enter amount" />
    <input type="text" id="bankName" placeholder="Bank / UPI Name" />
    <input type="text" id="accountNumber" placeholder="Account Number / UPI ID" />

    <button onclick="requestWithdraw()">Submit Withdraw Request</button>
  </div>

  <script type="module" src="./js/withdrawal.js"></script>
</body>
</html>
