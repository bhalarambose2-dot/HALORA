<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HALORA HOTEL Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{
      background: radial-gradient(circle at top,#0b1020,#030712 70%);
      color:#fff;
      min-height:100vh;
      padding-bottom:30px;
    }
    .container{
      width:100%;
      max-width:520px;
      margin:auto;
      padding:16px;
    }
    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      margin-bottom:16px;
      margin-top:6px;
    }
    .menu-btn{
      width:48px;height:48px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      font-size:22px;cursor:pointer;
    }
    .search-box{
      flex:1;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:14px 16px;
      color:#fff;
      outline:none;
      font-size:14px;
    }
    .header{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:18px;
    }
    .brand h1{
      font-size:30px;font-weight:800;
      background:linear-gradient(90deg,#fff,#ffb300);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }
    .brand p{color:#cbd5e1;font-size:14px;margin-top:4px;}
    .logout-btn{
      background:linear-gradient(135deg,#ffb300,#ff8c00);
      color:#111827;border:none;padding:12px 18px;border-radius:16px;
      font-weight:700;font-size:14px;cursor:pointer;
      box-shadow:0 10px 20px rgba(255,179,0,0.25);
    }

    .hero{
      background:linear-gradient(135deg,rgba(15,23,42,0.96),rgba(30,41,59,0.92));
      border:1px solid rgba(255,255,255,0.08);
      border-radius:28px;
      padding:20px;
      overflow:hidden;
      position:relative;
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
      margin-bottom:18px;
    }
    .hero-img{
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:20px;
      margin-top:14px;
      border:1px solid rgba(255,255,255,0.06);
    }
    .hero h2{
      font-size:30px;line-height:1.1;font-weight:800;
      margin-bottom:10px;max-width:280px;
    }
    .hero p{
      color:#dbe4f0;font-size:15px;line-height:1.7;max-width:320px;
    }

    .tab-buttons{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:16px;
    }
    .tab-btn{
      border:none;border-radius:16px;padding:12px 10px;
      font-size:14px;font-weight:700;cursor:pointer;
      background:rgba(255,255,255,0.08);color:#fff;
      border:1px solid rgba(255,255,255,0.06);
    }
    .tab-btn.active{
      background:linear-gradient(135deg,#ffb300,#ff8c00);
      color:#111827;
    }

    .stats-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:18px;
    }
    .stat-card{
      background:rgba(15,23,42,0.82);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:24px;
      padding:20px 18px;
    }
    .stat-value{
      font-size:34px;font-weight:800;color:#ffb300;margin-bottom:8px;
    }
    .stat-label{color:#cbd5e1;font-size:15px;}

    .section-title{
      font-size:22px;font-weight:700;margin:24px 0 14px;
    }

    .panel{
      display:none;
      background:rgba(15,23,42,0.82);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:24px;
      padding:20px;
      margin-top:14px;
    }
    .panel.active{display:block;}

    .edit-input{
      width:100%;
      padding:14px;
      margin-top:12px;
      border:none;
      border-radius:14px;
      outline:none;
      background:#0f172a;
      color:#fff;
      font-size:15px;
      border:1px solid rgba(255,255,255,0.08);
    }
    .save-btn{
      margin-top:14px;
      width:100%;
      background:linear-gradient(135deg,#ffb300,#ff8c00);
      border:none;color:#111827;font-weight:700;
      padding:14px;border-radius:16px;cursor:pointer;font-size:16px;
    }

    .toggle-wrap{
      display:flex;justify-content:space-between;align-items:center;
      margin-top:16px;padding:16px;background:rgba(255,255,255,0.03);
      border-radius:16px;
    }
    .switch{position:relative;display:inline-block;width:56px;height:30px;}
    .switch input{opacity:0;width:0;height:0;}
    .slider{
      position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
      background:#475569;transition:.4s;border-radius:999px;
    }
    .slider:before{
      position:absolute;content:"";height:22px;width:22px;left:4px;bottom:4px;
      background:white;transition:.4s;border-radius:50%;
    }
    input:checked + .slider{background:#22c55e;}
    input:checked + .slider:before{transform:translateX(26px);}

    .booking-card{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:22px;
      padding:16px;
      margin-top:14px;
    }
    .booking-top{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:10px;gap:10px;
    }
    .booking-name{font-size:18px;font-weight:700;}
    .booking-status{
      padding:6px 12px;border-radius:999px;font-size:12px;font-weight:700;
    }
    .pending{background:rgba(245,158,11,0.15);color:#f59e0b;}
    .confirmed{background:rgba(34,197,94,0.15);color:#22c55e;}
    .rejected{background:rgba(239,68,68,0.15);color:#ef4444;}
    .booking-details{color:#cbd5e1;font-size:14px;line-height:1.8;}
    .booking-actions{display:flex;gap:10px;margin-top:14px;}
    .approve-btn,.reject-btn{
      flex:1;border:none;padding:12px;border-radius:14px;font-weight:700;
      cursor:pointer;font-size:14px;
    }
    .approve-btn{
      background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.25);
    }
    .reject-btn{
      background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.25);
    }

    .hidden{display:none!important;}
  </style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <div class="menu-btn">☰</div>
    <input type="text" id="globalSearch" class="search-box" placeholder="Search bookings, guests..." onkeyup="searchBookings()">
  </div>

  <div class="header">
    <div class="brand">
      <h1>HALORA HOTEL</h1>
      <p>Hotel Partner Dashboard</p>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="hero">
    <h2>Manage your hotel with HALORA</h2>
    <p>Update hotel details, room prices, room availability, and booking requests — all in one place.</p>
    <img id="heroHotelImage" class="hero-img" src="https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1000" alt="Hotel Image">

    <div class="tab-buttons">
      <button class="tab-btn active" onclick="openTab('editPanel', this)">Edit Hotel</button>
      <button class="tab-btn" onclick="openTab('bookingPanel', this)">Bookings</button>
      <button class="tab-btn" onclick="openTab('pricePanel', this)">Price</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="totalBookings">0</div>
      <div class="stat-label">Total Bookings</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="roomPrice">₹0</div>
      <div class="stat-label">Room Price</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="monthlyEarnings">₹0</div>
      <div class="stat-label">Monthly Earnings</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="todayBookings">0</div>
      <div class="stat-label">Today Bookings</div>
    </div>
  </div>

  <h3 class="section-title">HALORA Hotel Controls</h3>

  <!-- EDIT HOTEL PANEL -->
  <div class="panel active" id="editPanel">
    <input type="text" id="editHotelName" class="edit-input" placeholder="Hotel Name">
    <input type="text" id="editCity" class="edit-input" placeholder="City">
    <input type="text" id="editContact" class="edit-input" placeholder="Contact Number">
    <input type="number" id="editRooms" class="edit-input" placeholder="Available Rooms">
    <input type="time" id="editCheckIn" class="edit-input">
    <input type="time" id="editCheckOut" class="edit-input">
    <input type="text" id="editImage" class="edit-input" placeholder="Hotel Image URL">
    <button class="save-btn" onclick="saveHotelDetails()">Save Hotel Details</button>

    <div class="toggle-wrap">
      <span>Hotel Availability</span>
      <label class="switch">
        <input type="checkbox" id="hotelAvailabilityToggle" onchange="toggleHotelStatus()">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- BOOKINGS PANEL -->
  <div class="panel" id="bookingPanel">
    <input type="text" id="bookingSearch" class="edit-input" placeholder="Search customer / booking..." onkeyup="searchBookings()">
    <div id="bookingsContainer"></div>
  </div>

  <!-- PRICE PANEL -->
  <div class="panel" id="pricePanel">
    <input type="text" id="priceSearch" class="edit-input" placeholder="Search room type / price note">
    <input type="number" id="newRoomPrice" class="edit-input" placeholder="Enter new room price">
    <button class="save-btn" onclick="updateRoomPrice()">Save New Price</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDJnOh92AYUzFeWtuLMtDciETdpCQ7-MNs",
    authDomain: "halorebook.firebaseapp.com",
    databaseURL: "https://halorebook-default-rtdb.firebaseio.com",
    projectId: "halorebook",
    storageBucket: "halorebook.firebasestorage.app",
    messagingSenderId: "58132767978",
    appId: "1:58132767978:web:2165ca8a94fb0cfe5a6393",
    measurementId: "G-2MX4YC3ESQ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  const hotelId = "hotel_001";

  window.openTab = function(panelId, btn){
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById(panelId).classList.add("active");
    btn.classList.add("active");
  }

  async function loadHotelData() {
    const hotelRef = ref(db, 'hotels/' + hotelId);
    const snapshot = await get(hotelRef);

    if (snapshot.exists()) {
      const data = snapshot.val();

      document.getElementById("editHotelName").value = data.hotelName || "";
      document.getElementById("editCity").value = data.city || "";
      document.getElementById("editContact").value = data.contact || "";
      document.getElementById("editRooms").value = data.availableRooms || "";
      document.getElementById("editCheckIn").value = convertToTimeInput(data.checkIn || "12:00 PM");
      document.getElementById("editCheckOut").value = convertToTimeInput(data.checkOut || "11:00 AM");
      document.getElementById("editImage").value = data.hotelImage || "";
      document.getElementById("heroHotelImage").src = data.hotelImage || "https://images.unsplash.com/photo-1566073771259-6a8506099945?q=80&w=1000";
      document.getElementById("roomPrice").innerText = "₹" + (data.roomPrice || 0);
      document.getElementById("monthlyEarnings").innerText = "₹" + (data.monthlyEarnings || 0);
      document.getElementById("todayBookings").innerText = data.todayBookings || 0;
      document.getElementById("totalBookings").innerText = data.totalBookings || 0;
      document.getElementById("hotelAvailabilityToggle").checked = data.status === "Active";
    }
  }

  async function loadBookings() {
    const bookingsRef = ref(db, 'hotelBookings/' + hotelId);
    const snapshot = await get(bookingsRef);
    const container = document.getElementById("bookingsContainer");
    container.innerHTML = "";

    if (snapshot.exists()) {
      const bookings = snapshot.val();

      Object.entries(bookings).reverse().forEach(([bookingId, booking]) => {
        let statusClass = "pending";
        if(booking.status === "Confirmed") statusClass = "confirmed";
        if(booking.status === "Rejected") statusClass = "rejected";

        container.innerHTML += `
          <div class="booking-card">
            <div class="booking-top">
              <div class="booking-name">${booking.name || "Guest"}</div>
              <div class="booking-status ${statusClass}">${booking.status || "Pending"}</div>
            </div>
            <div class="booking-details">
              Room: ${booking.roomType || "Standard"}<br>
              Check-in: ${booking.checkInDate || "-"}<br>
              Nights: ${booking.nights || 1}<br>
              Guests: ${booking.guests || 1}
            </div>
            <div class="booking-actions">
              <button class="approve-btn" onclick="updateBookingStatus('${bookingId}','Confirmed')">Approve</button>
              <button class="reject-btn" onclick="updateBookingStatus('${bookingId}','Rejected')">Reject</button>
            </div>
          </div>
        `;
      });
    } else {
      container.innerHTML = `<div class="booking-card"><div class="booking-details">No bookings yet.</div></div>`;
    }
  }

  window.saveHotelDetails = async function () {
    const hotelName = document.getElementById("editHotelName").value;
    const city = document.getElementById("editCity").value;
    const contact = document.getElementById("editContact").value;
    const availableRooms = document.getElementById("editRooms").value;
    const checkIn = document.getElementById("editCheckIn").value;
    const checkOut = document.getElementById("editCheckOut").value;
    const hotelImage = document.getElementById("editImage").value;

    await update(ref(db, 'hotels/' + hotelId), {
      hotelName,
      city,
      contact,
      availableRooms: Number(availableRooms),
      checkIn: convertToAMPM(checkIn),
      checkOut: convertToAMPM(checkOut),
      hotelImage
    });

    document.getElementById("heroHotelImage").src = hotelImage;
    alert("Hotel details updated successfully!");
  }

  window.updateRoomPrice = async function () {
    const newPrice = document.getElementById("newRoomPrice").value;
    if (!newPrice) return alert("Enter new room price");

    await update(ref(db, 'hotels/' + hotelId), {
      roomPrice: Number(newPrice)
    });

    document.getElementById("roomPrice").innerText = "₹" + newPrice;
    alert("Room price updated successfully!");
    document.getElementById("newRoomPrice").value = "";
  }

  window.toggleHotelStatus = async function () {
    const isActive = document.getElementById("hotelAvailabilityToggle").checked;
    await update(ref(db, 'hotels/' + hotelId), {
      status: isActive ? "Active" : "Inactive"
    });
  }

  window.updateBookingStatus = async function (bookingId, status) {
    await update(ref(db, 'hotelBookings/' + hotelId + '/' + bookingId), {
      status: status
    });
    loadBookings();
  }

  window.searchBookings = function () {
    const g = document.getElementById("globalSearch").value.toLowerCase();
    const b = document.getElementById("bookingSearch").value.toLowerCase();
    const searchText = (g + " " + b).trim();

    document.querySelectorAll(".booking-card").forEach(card => {
      const text = card.innerText.toLowerCase();
      card.classList.toggle("hidden", !text.includes(searchText));
    });
  }

  window.logout = async function () {
    try { await signOut(auth); } catch(e){}
    alert("Logged out successfully");
  }

  function convertToAMPM(time24) {
    if (!time24) return "";
    let [hours, minutes] = time24.split(':');
    hours = parseInt(hours);
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    return `${hours}:${minutes} ${ampm}`;
  }

  function convertToTimeInput(time12h) {
    if (!time12h) return "";
    const [time, modifier] = time12h.split(' ');
    let [hours, minutes] = time.split(':');
    hours = parseInt(hours);

    if (modifier === 'PM' && hours < 12) hours += 12;
    if (modifier === 'AM' && hours === 12) hours = 0;

    return `${String(hours).padStart(2, '0')}:${minutes}`;
  }

  loadHotelData();
  loadBookings();
</script>

  <script type="module" src="./hotel-dashboard.js"></script>

</body>
</html>
