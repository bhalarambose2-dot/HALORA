<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Trip Explorer – Booking & Price Filter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* Filter Bar */
        .filter-bar {
            background: white;
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .filter-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            background: #f0f0f0;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Price Filter Row */
        .price-filter-row {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .price-filter-label {
            font-weight: bold;
            color: #333;
        }

        .price-slider {
            flex: 2;
            min-width: 200px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #764ba2;
            border-radius: 50%;
            cursor: pointer;
        }

        .price-values {
            display: flex;
            gap: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .price-values span {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
        }

        /* Search Box */
        .search-box {
            text-align: center;
            margin-bottom: 30px;
        }

        .search-box input {
            width: 80%;
            max-width: 400px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Trip Grid */
        .trip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .trip-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .trip-card:hover {
            transform: translateY(-5px);
        }

        .trip-image {
            height: 180px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .trip-content {
            padding: 20px;
        }

        .trip-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .trip-duration {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .trip-destinations {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            gap: 8px;
        }

        .price-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            background: #f8f8f8;
            border-radius: 10px;
        }

        .price-label {
            font-size: 11px;
            color: #888;
        }

        .price-value.budget { color: #28a745; font-weight: bold; }
        .price-value.mid { color: #ff9800; font-weight: bold; }
        .price-value.luxury { color: #9c27b0; font-weight: bold; }

        .book-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .modal-body {
            padding: 20px;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .submit-booking {
            background: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .trip-grid { grid-template-columns: 1fr; }
            .filter-bar { border-radius: 20px; }
        }
    </style>
</head>
<body>

<div class="header">

    <p>50+ Tours | Booking Available | Price Filter</p>
</div>

<div class="filter-bar">

<div class="price-filter-row">

    <div class="price-slider">

    <div class="price-values">

</div>

<div class="search-box">

</div>

<div class="trip-grid" id="tripGrid"></div>

<div class="footer">
    <p>✨ Prices are per person (2 Nights/3 Days package) | Taxes extra | Best season: Oct-Mar</p>
</div>

<!-- Booking Modal -->
<div id="bookingModal" class="modal">

        </div>
        <div class="modal-body">
            <form id="bookingForm">
                <input type="hidden" id="bookTripId">
                <label>Full Name</label>
                <input type="text" id="userName" required placeholder="Enter your name">
                <label>Email</label>
                <input type="email" id="userEmail" required placeholder="you@example.com">
                <label>Phone</label>
                <input type="tel" id="userPhone" required placeholder="10-digit number">
                <label>Travellers (Adults)</label>
                <input type="number" id="travelers" min="1" value="1">
                <label>Preferred Travel Date</label>
                <input type="date" id="travelDate">
                <label>Price Tier</label>
                <select id="priceTier">
                    <option value="budget">Budget</option>
                    <option value="mid">Mid-Range</option>
                    <option value="luxury">Luxury</option>
                </select>
                <button type="submit" class="submit-booking">Confirm Booking</button>
            </form>
            <p id="bookingMessage" style="margin-top:10px; text-align:center;"></p>
        </div>
    </div>
</div>

        if (tier === "budget") return trip.budget;
        if (tier === "mid") return trip.mid;
        return trip.luxury;
    }

    // Filter trips based on region, search, and max price (using mid-range as default for filter)
    function getFilteredTrips() {

        if (currentFilter !== "all") {
            filtered = filtered.filter(t => t.region === currentFilter);

            filtered = filtered.filter(t => t.name.toLowerCase().includes(term) || t.destinations.toLowerCase().includes(term));

        // Price filter: keep trips where mid-range price <= maxPrice

        return filtered;
    }
