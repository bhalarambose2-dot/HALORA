<!DOCTYPE html>
<html>

<head>
  <title>KYC Form</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0b0f19, #121a2f);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #131b2d;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 8px;
      background: #1f2a44;
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #aaa;
    }

    input:focus {
      border: 1px solid #00ffcc;
      box-shadow: 0 0 5px #00ffcc;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: #00c853;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00e676;
      transform: scale(1.03);
    }

    .tag {
      font-size: 12px;
      color: #00ffcc;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="box">

<h2>KYC Form</h2>
<p class="tag">Secure Verification 🔒</p>

<form onsubmit="submitForm(event)">

<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Mobile Number" required>
<input id="address" placeholder="Address" required>

<input id="aadhaar" placeholder="Aadhaar Number" required>
<input id="pan" placeholder="PAN Number" required>

<div id="extra"></div>

<button type="submit">Continue → Payment</button>

</form>

</div>

<script type="module">

import { db } from "./js/firebase-config.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const type = localStorage.getItem("partnerType");
const extra = document.getElementById("extra");

// Dynamic fields
if(type === "driver"){
  extra.innerHTML = `<input id="dl" placeholder="Driving License" required>`;
}
if(type === "hotel"){
  extra.innerHTML = `<input id="hotel" placeholder="Hotel License" required>`;
}

window.submitForm = async (e)=>{
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    aadhaar: document.getElementById("aadhaar").value,
    pan: document.getElementById("pan").value,
    partnerType: type,
    plan: localStorage.getItem("planPrice"),
    status: "KYC Done",
    createdAt: Date.now()
  };

  if(type==="driver") data.dl = document.getElementById("dl").value;
  if(type==="hotel") data.hotel = document.getElementById("hotel").value;

  try{
    const docRef = await addDoc(collection(db,"partners"), data);

    localStorage.setItem("partnerId", docRef.id);

    window.location.href = "prime-payment.html";

  }catch(err){
    alert("Error: " + err.message);
  }
};

</script>

</body>
</html>
