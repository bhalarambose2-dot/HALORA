<!DOCTYPE html>
<html>
<head>
<style>
body{
margin:0;
background:linear-gradient(#0b0f19,#121a2f);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Poppins;
}

.box{
background:#131b2d;
padding:25px;
border-radius:15px;
text-align:center;
}

button{
padding:12px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.pay{background:#00c853;}
.done{background:#2962ff;}
</style>
</head>

<body>

<div class="box">

<h2 id="amount"></h2>

<button class="pay" onclick="payNow()">Pay Now</button>
<button class="done" onclick="done()">I Have Paid</button>

</div>

<script type="module">
import { db } from "./js/firebase-config.js";
import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const amount=localStorage.getItem("planPrice")||299;
amountEl.innerText="Pay ₹"+amount;

window.payNow=()=>{
window.location=`upi://pay?pa=cedarjs@ibl&pn=HALORA&am=${amount}&cu=INR`;
};

window.done=async()=>{
const id=localStorage.getItem("partnerId");

await updateDoc(doc(db,"partners",id),{
status:"KYC + Payment Pending",
paymentTime:Date.now()
});

window.location="payment-success.html";
};
</script>

</body>
</html>
