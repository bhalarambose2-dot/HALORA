<!-- ADD THIS INSIDE BODY TOP (HEADER UPGRADE) -->

<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <input type="text" id="searchInput" placeholder="Search bookings, guests..." onkeyup="searchData()">
</div>

<!-- SIDE MENU -->
<div id="sideMenu" class="side-menu">
  <h3>HALORA MENU</h3>
  <button onclick="showSection('dashboard')">🏠 Dashboard</button>
  <button onclick="showSection('bookings')">📅 Bookings</button>
  <button onclick="showSection('settings')">⚙️ Settings</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- MAIN SECTIONS -->
<div id="dashboardSection">
  <!-- EXISTING DASHBOARD CONTENT -->
</div>

<div id="bookingsSection" style="display:none;">
  <h3 class="section-title">All Bookings</h3>
  <div id="allBookings"></div>
</div>

<div id="settingsSection" style="display:none;">
  <h3 class="section-title">Settings</h3>
  <p style="color:#aaa">Hotel settings & controls</p>
</div>

<!-- BOTTOM NAVIGATION -->
<div class="bottom-nav">
  <div onclick="showSection('dashboard')">🏠</div>
  <div onclick="showSection('bookings')">📅</div>
  <div onclick="showSection('settings')">⚙️</div>
</div>

<style>
/* TOP BAR */
.topbar{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

#searchInput{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#0f172a;
  color:#fff;
}

/* SIDE MENU */
.side-menu{
  position:fixed;
  top:0;
  left:-250px;
  width:240px;
  height:100%;
  background:#020617;
  padding:20px;
  transition:0.3s;
  z-index:999;
}

.side-menu.active{
  left:0;
}

.side-menu button{
  display:block;
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  background:#0f172a;
  color:#fff;
  border-radius:10px;
  text-align:left;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#020617;
  padding:10px 0;
  border-top:1px solid rgba(255,255,255,0.1);
}

.bottom-nav div{
  font-size:20px;
  cursor:pointer;
}
</style>

<script>
// MENU
function toggleMenu(){
  document.getElementById("sideMenu").classList.toggle("active");
}

// SECTION SWITCH
function showSection(section){
  document.getElementById("dashboardSection").style.display="none";
  document.getElementById("bookingsSection").style.display="none";
  document.getElementById("settingsSection").style.display="none";

  document.getElementById(section+"Section").style.display="block";
}

// SEARCH SYSTEM
function searchData(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.querySelectorAll(".booking-card");

  cards.forEach(card=>{
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(input) ? "block" : "none";
  });
}

// LOAD BOOKINGS ALSO IN ALL BOOKINGS PAGE
async function loadBookings() {
  const bookingsRef = ref(db, 'hotelBookings/' + hotelId);
  const snapshot = await get(bookingsRef);

  const container = document.getElementById("bookingsContainer");
  const allContainer = document.getElementById("allBookings");

  container.innerHTML = "";
  allContainer.innerHTML = "";

  if (snapshot.exists()) {
    const bookings = snapshot.val();

    Object.entries(bookings).forEach(([id, booking]) => {

      const card = `
      <div class="booking-card">
        <div class="booking-top">
          <div class="booking-name">${booking.name}</div>
          <div class="booking-status">${booking.status}</div>
        </div>
        <div class="booking-details">
          ${booking.roomType} | ${booking.checkInDate}
        </div>
      </div>`;

      container.innerHTML += card;
      allContainer.innerHTML += card;
    });
  }
}
</script>
