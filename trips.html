<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HALORA PRO - All India Trips</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            padding-bottom: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo span {
            color: #ff6b6b;
        }

        .tagline {
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .page-title {
            font-size: 1.3rem;
            margin-top: 10px;
        }

        .page-title span {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Filter Tabs */
        .filter-tabs {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            background: white;
            margin: 15px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .filter-chip {
            background: #f0f0f0;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Search Box */
        .search-box {
            padding: 0 20px;
            margin: 15px 0;
        }

        .search-box input {
            width: 100%;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: white;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            outline: none;
        }

        /* Price Filter */
        .price-filter {
            margin: 15px 20px;
            background: white;
            border-radius: 20px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .price-filter label {
            font-size: 0.8rem;
            font-weight: bold;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #764ba2;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 12px;
            padding: 0 20px;
            margin: 15px 0;
        }

        .stat-card {
            flex: 1;
            background: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #888;
        }

        /* Trips List */
        .trips-list {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .trip-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.2s;
            cursor: pointer;
        }

        .trip-card:active {
            transform: scale(0.98);
        }

        .trip-img {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .trip-category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .trip-price-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .trip-info {
            padding: 15px;
        }

        .trip-name {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .trip-duration {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 5px;
        }

        .trip-destinations {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 10px;
        }

        .price-row {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }

        .price-tag {
            flex: 1;
            text-align: center;
            padding: 6px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .price-label {
            font-size: 0.6rem;
            color: #888;
        }

        .price-value {
            font-weight: bold;
            font-size: 0.8rem;
        }

        .price-value.budget { color: #28a745; }
        .price-value.mid { color: #ff9800; }
        .price-value.luxury { color: #9c27b0; }

        .book-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            max-width: 400px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 25px 25px 0 0;
        }

        .modal-body {
            padding: 20px;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .submit-booking {
            background: #28a745;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div>
            <div class="logo">HALORA <span>PRO</span></div>
            <div class="tagline">Ride · Hotel · Trip · Partner</div>
        </div>
        <button class="back-btn" onclick="window.history.back()">← Back</button>
    </div>
    <div class="page-title">
        🗺️ All India Trips <span>50+ destinations</span>
    </div>
</div>

<div class="stats-row">
    <div class="stat-card">
        <div class="stat-value">50+</div>
        <div class="stat-label">Handcrafted Tours</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">₹1,240</div>
        <div class="stat-label">Avg Savings</div>
    </div>
    <div class="stat-card">
        <div class="stat-value">4.8⭐</div>
        <div class="stat-label">Customer Rating</div>
    </div>
</div>

<div class="filter-tabs" id="filterTabs">
    <div class="filter-chip active" data-filter="all">🎯 All Trips</div>
    <div class="filter-chip" data-filter="Popular">🔥 Popular</div>
    <div class="filter-chip" data-filter="Beach">🏖️ Beach</div>
    <div class="filter-chip" data-filter="Hill">🏔️ Hill Station</div>
    <div class="filter-chip" data-filter="Heritage">🏛️ Heritage</div>
    <div class="filter-chip" data-filter="Spiritual">🕉️ Spiritual</div>
</div>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Search trips by name or destination...">
</div>

<div class="price-filter">
    <label>💰 Max Budget (per person):</label>
    <input type="range" id="priceSlider" min="0" max="50000" step="1000" value="50000">
    <span id="priceValue">₹50,000+</span>
</div>

<div class="trips-list" id="tripsList">
    <!-- Trips will be loaded here -->
</div>

<div class="footer">
    ✨ Prices are per person | Taxes extra | Best season: Oct-Mar
</div>

<!-- Booking Modal -->
<div id="bookingModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close-modal">&times;</span>
            <h2 id="modalTripName">Book Your Trip</h2>
        </div>
        <div class="modal-body">
            <form id="bookingForm">
                <input type="hidden" id="bookTripId">
                <input type="text" id="userName" placeholder="Full Name" required>
                <input type="email" id="userEmail" placeholder="Email Address" required>
                <input type="tel" id="userPhone" placeholder="Phone Number" required>
                <input type="number" id="travelers" placeholder="Number of Travelers" min="1" value="1">
                <input type="date" id="travelDate">
                <select id="priceTier">
                    <option value="budget">🎒 Budget</option>
                    <option value="mid">⭐ Mid-Range</option>
                    <option value="luxury">✨ Luxury</option>
                </select>
                <button type="submit" class="submit-booking">✅ Confirm Booking</button>
            </form>
            <p id="bookingMessage" style="margin-top:12px; text-align:center;"></p>
        </div>
    </div>
</div>

<script>
    // ==================== 15 TRIPS DATABASE ====================
    const tripsData = [
        {id:1, name:"Rajasthan Royal Tour", category:"Popular", duration:"5N/6D", budget:4999, mid:9999, luxury:24999, destinations:"Jaipur → Jodhpur → Udaipur → Jaisalmer", photoKeyword:"rajasthan-amber-fort", regionTag:"🏛️ Heritage", bestFor:"Royal Experience"},
        {id:2, name:"Goa Beach Paradise", category:"Beach", duration:"3N/4D", budget:6999, mid:12999, luxury:29999, destinations:"North Goa → South Goa → Dudhsagar", photoKeyword:"goa-beach-party", regionTag:"🏖️ Beach", bestFor:"Party & Relax"},
        {id:3, name:"Kerala Backwaters", category:"Popular", duration:"4N/5D", budget:8999, mid:16999, luxury:39999, destinations:"Alleppey → Munnar → Kochi", photoKeyword:"kerala-backwaters-houseboat", regionTag:"🌴 God's Own", bestFor:"Romantic"},
        {id:4, name:"Manali Adventure", category:"Hill", duration:"4N/5D", budget:5999, mid:11999, luxury:27999, destinations:"Manali → Solang → Rohtang", photoKeyword:"manali-snow-mountains", regionTag:"🏔️ Adventure", bestFor:"Nature Lovers"},
        {id:5, name:"Varanasi Spiritual", category:"Spiritual", duration:"2N/3D", budget:2999, mid:5999, luxury:14999, destinations:"Varanasi → Sarnath → Ganga Aarti", photoKeyword:"varanasi-ganga-aarti", regionTag:"🕉️ Spiritual", bestFor:"Soul Seekers"},
        {id:6, name:"Shimla Manali", category:"Hill", duration:"6N/7D", budget:8999, mid:16999, luxury:39999, destinations:"Shimla → Kufri → Manali", photoKeyword:"shimla-hill-station", regionTag:"🏔️ Queen of Hills", bestFor:"Family"},
        {id:7, name:"Kashmir Paradise", category:"Popular", duration:"5N/6D", budget:12999, mid:24999, luxury:59999, destinations:"Srinagar → Gulmarg → Pahalgam", photoKeyword:"kashmir-gulmarg-snow", regionTag:"🌸 Heaven", bestFor:"Honeymoon"},
        {id:8, name:"Ooty Coonoor", category:"Hill", duration:"3N/4D", budget:4999, mid:9999, luxury:19999, destinations:"Ooty Lake → Coonoor → Toy Train", photoKeyword:"ooty-toy-train", regionTag:"🚂 Nilgiris", bestFor:"Weekend"},
        {id:9, name:"Mumbai Goa", category:"Beach", duration:"6N/7D", budget:9999, mid:19999, luxury:49999, destinations:"Mumbai → Alibaug → Goa", photoKeyword:"mumbai-gateway-india", regionTag:"🌉 Coastal", bestFor:"Road Trip"},
        {id:10, name:"Amritsar Wagah", category:"Spiritual", duration:"2N/3D", budget:3499, mid:6999, luxury:15999, destinations:"Golden Temple → Wagah Border", photoKeyword:"golden-temple-amritsar", regionTag:"🙏 Devotion", bestFor:"Patriotism"},
        {id:11, name:"Leh Ladakh", category:"Popular", duration:"7N/8D", budget:15999, mid:29999, luxury:69999, destinations:"Leh → Pangong → Nubra", photoKeyword:"leh-ladakh-pangong-lake", regionTag:"🏍️ Adventure", bestFor:"Bikers"},
        {id:12, name:"Darjeeling Gangtok", category:"Hill", duration:"5N/6D", budget:8999, mid:16999, luxury:39999, destinations:"Darjeeling → Gangtok → Tsomgo", photoKeyword:"darjeeling-toy-train-hills", regionTag:"🚂 Tea Gardens", bestFor:"Peace"},
        {id:13, name:"Andaman Nicobar", category:"Beach", duration:"5N/6D", budget:14999, mid:29999, luxury:69999, destinations:"Port Blair → Havelock → Neil", photoKeyword:"andaman-radhanagar-beach", regionTag:"🏝️ Tropical", bestFor:"Beach Paradise"},
        {id:14, name:"Khajuraho Orchha", category:"Heritage", duration:"3N/4D", budget:5999, mid:11999, luxury:27999, destinations:"Khajuraho → Orchha", photoKeyword:"khajuraho-temples-sculpture", regionTag:"🛕 UNESCO", bestFor:"Architecture"},
        {id:15, name:"Rishikesh Haridwar", category:"Spiritual", duration:"3N/4D", budget:3999, mid:7999, luxury:18999, destinations:"Rishikesh → Haridwar", photoKeyword:"rishikesh-ganga-rafting", regionTag:"🚣 Yoga", bestFor:"Spirituality"}
    ];

    // State variables
    let currentFilter = "all";
    let currentSearch = "";
    let maxPrice = 50000;

    // DOM elements
    const tripsList = document.getElementById("tripsList");
    const searchInput = document.getElementById("searchInput");
    const priceSlider = document.getElementById("priceSlider");
    const priceValueSpan = document.getElementById("priceValue");

    // HD Photo URL generator using Unsplash
    function getPhotoUrl(keyword, width = 400, height = 200) {
        return `https://source.unsplash.com/featured/${width}x${height}/?${keyword},india,travel`;
    }

    // Filter trips based on category, search, and max price
    function getFilteredTrips() {
        let filtered = tripsData;
        
        // Category filter
        if (currentFilter !== "all") {
            filtered = filtered.filter(trip => trip.category === currentFilter);
        }
        
        // Search filter
        if (currentSearch.trim() !== "") {
            const term = currentSearch.toLowerCase();
            filtered = filtered.filter(trip => 
                trip.name.toLowerCase().includes(term) || 
                trip.destinations.toLowerCase().includes(term)
            );
        }
        
        // Price filter (using mid-range price)
        filtered = filtered.filter(trip => trip.mid <= maxPrice);
        
        return filtered;
    }

    // Render trips to the grid
    function renderTrips() {
        const filtered = getFilteredTrips();
        
        if (filtered.length === 0) {
            tripsList.innerHTML = '<div class="no-results">❌ No trips found. Try adjusting filters or search!</div>';
            return;
        }

        tripsList.innerHTML = filtered.map(trip => `
            <div class="trip-card" onclick="openBookingModal(${trip.id})">
                <div class="trip-img" style="background-image: url('${getPhotoUrl(trip.photoKeyword)}');">
                    <div class="trip-category-badge">${trip.regionTag}</div>
                    <div class="trip-price-badge">${trip.category}</div>
                </div>
                <div class="trip-info">
                    <div class="trip-name">${trip.name}</div>
                    <div class="trip-duration">📅 ${trip.duration}</div>
                    <div class="trip-destinations">📍 ${trip.destinations}</div>
                    <div class="price-row">
                        <div class="price-tag">
                            <div class="price-label">🎒 BUDGET</div>
                            <div class="price-value budget">₹${trip.budget.toLocaleString()}</div>
                        </div>
                        <div class="price-tag">
                            <div class="price-label">⭐ MID-RANGE</div>
                            <div class="price-value mid">₹${trip.mid.toLocaleString()}</div>
                        </div>
                        <div class="price-tag">
                            <div class="price-label">✨ LUXURY</div>
                            <div class="price-value luxury">₹${trip.luxury.toLocaleString()}</div>
                        </div>
                    </div>
                    <button class="book-btn">📅 Book Now</button>
                </div>
            </div>
        `).join("");
    }

    // ==================== FILTER EVENT LISTENERS ====================
    
    // Filter chips
    document.querySelectorAll(".filter-chip").forEach(chip => {
        chip.addEventListener("click", () => {
            document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
            chip.classList.add("active");
            currentFilter = chip.getAttribute("data-filter");
            renderTrips();
        });
    });

    // Search input
    searchInput.addEventListener("input", (e) => {
        currentSearch = e.target.value;
        renderTrips();
    });

    // Price slider
    priceSlider.addEventListener("input", function() {
        maxPrice = parseInt(this.value);
        if (maxPrice === 50000) {
            priceValueSpan.innerText = "₹50,000+";
        } else {
            priceValueSpan.innerText = `₹${maxPrice.toLocaleString()}`;
        }
        renderTrips();
    });

    // ==================== BOOKING MODAL FUNCTIONS ====================
    
    const modal = document.getElementById("bookingModal");
    const closeModalSpan = document.querySelector(".close-modal");
    const bookingForm = document.getElementById("bookingForm");
    const modalTripName = document.getElementById("modalTripName");
    const bookTripId = document.getElementById("bookTripId");

    function openBookingModal(tripId) {
        const trip = tripsData.find(t => t.id === tripId);
        if (!trip) return;
        
        modalTripName.innerText = `Book: ${trip.name}`;
        bookTripId.value = tripId;
        modal.style.display = "flex";
        document.getElementById("bookingMessage").innerHTML = "";
        
        // Reset form
        document.getElementById("userName").value = "";
        document.getElementById("userEmail").value = "";
        document.getElementById("userPhone").value = "";
        document.getElementById("travelers").value = "1";
        document.getElementById("travelDate").value = "";
        document.getElementById("priceTier").value = "budget";
    }

    function closeModal() {
        modal.style.display = "none";
    }

    function getTripPrice(trip, tier) {
        if (tier === "budget") return trip.budget;
        if (tier === "mid") return trip.mid;
        return trip.luxury;
    }

    // Booking form submission
    bookingForm.addEventListener("submit", function(e) {
        e.preventDefault();
        
        const tripId = parseInt(bookTripId.value);
        const trip = tripsData.find(t => t.id === tripId);
        const name = document.getElementById("userName").value.trim();
        const email = document.getElementById("userEmail").value.trim();
        const phone = document.getElementById("userPhone").value.trim();
        const travelers = parseInt(document.getElementById("travelers").value);
        const travelDate = document.getElementById("travelDate").value;
        const tier = document.getElementById("priceTier").value;
        
        const price = getTripPrice(trip, tier);
        const total = price * travelers;
        
        if (!name || !email || !phone) {
            document.getElementById("bookingMessage").innerHTML = "❌ Please fill all required fields!";
            document.getElementById("bookingMessage").style.color = "#dc3545";
            return;
        }
        
        document.getElementById("bookingMessage").innerHTML = `✅ Thank you ${name}! Your booking for ${trip.name} (${travelers} traveler(s)) is confirmed. Total: ₹${total.toLocaleString()}. We'll contact you at ${email}.`;
        document.getElementById("bookingMessage").style.color = "#28a745";
        
        // Auto close modal after 3 seconds
        setTimeout(() => {
            closeModal();
        }, 3000);
    });

    // Close modal events
    closeModalSpan.onclick = closeModal;
    window.onclick = function(event) {
        if (event.target === modal) {
            closeModal();
        }
    }

    // Initial render
    renderTrips();
</script>
</body>
</html>
