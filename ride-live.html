<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Ride - HALORA</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- Leaflet Free Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <header class="map-header">
    <div class="logo">TRACK RIDE</div>
    <a class="logout-btn" href="customer.html">Back</a>
  </header>

  <main class="container">
    <section class="card">
      <h2>Your Live Ride</h2>
      <div id="rideStatus">Loading...</div>
      <hr />
      <p id="otpBox" class="muted">OTP will appear when driver accepts.</p>
      <p id="driverCoords" class="muted">Driver location: waiting...</p>

      <hr />
      <h3>Payment</h3>
      <p id="paymentMethodBox" class="muted">Method: Loading...</p>

      <div id="upiSection">
        <p class="muted">Pay your fare using any UPI app.</p>
        <div class="grid-2">
          <button id="payBtn" class="main-btn">Pay Now</button>
          <button id="paidBtn" class="secondary-btn">I Have Paid</button>
        </div>
      </div>

      <div id="cashSection" style="display:none;">
        <p class="muted">Cash selected. Pay cash directly to the driver at the end of the ride.</p>
      </div>

      <p id="paymentStatusBox" class="muted">Payment: unpaid</p>

      <br />
      <div id="map" style="width:100%; height:350px; border-radius:16px;"></div>
    </section>
  </main>

  <script type="module">
    import { db } from "./js/firebase-config.js";
    import { statusBadge, currency } from "./js/common.js";
    import {
      doc,
      onSnapshot,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const rideId = localStorage.getItem("rideId");
    const rideStatus = document.getElementById("rideStatus");
    const otpBox = document.getElementById("otpBox");
    const coordsEl = document.getElementById("driverCoords");
    const paymentStatusBox = document.getElementById("paymentStatusBox");
    const paymentMethodBox = document.getElementById("paymentMethodBox");
    const payBtn = document.getElementById("payBtn");
    const paidBtn = document.getElementById("paidBtn");
    const upiSection = document.getElementById("upiSection");
    const cashSection = document.getElementById("cashSection");

    const HALORA_UPI = "cedarjs@ibl";

    const map = L.map('map').setView([26.9124, 75.7873], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let driverMarker = null;
    let currentRide = null;

    if (!rideId) {
      rideStatus.innerHTML = "No ride found";
      payBtn.disabled = true;
      paidBtn.disabled = true;
    } else {
      onSnapshot(doc(db, "rides", rideId), (snap) => {
        const ride = snap.data();
        currentRide = ride;

        if (!ride) {
          rideStatus.innerHTML = "Ride not found";
          return;
        }

        rideStatus.innerHTML = `
          <div class="mini-card">
            <h3>${ride.pickup} → ${ride.drop}</h3>
            <p>Fare: ${currency(ride.fare)}</p>
            <p>Status: ${statusBadge(ride.status)}</p>
            <p>Payment Method: <b>${ride.paymentMethod || "UPI"}</b></p>
            <p>Payment: <b>${ride.paymentStatus || "unpaid"}</b></p>
          </div>
        `;

        paymentMethodBox.innerText = `Method: ${ride.paymentMethod || "UPI"}`;
        paymentStatusBox.innerText = `Payment: ${ride.paymentStatus || "unpaid"}`;

        // Show/hide sections
        if ((ride.paymentMethod || "UPI") === "Cash") {
          upiSection.style.display = "none";
          cashSection.style.display = "block";
        } else {
          upiSection.style.display = "block";
          cashSection.style.display = "none";
        }

        if (ride.otp) {
          otpBox.innerText = `Your OTP: ${ride.otp}`;
        }

        if (ride.driverLat && ride.driverLng) {
          coordsEl.innerText = `Driver location: Lat ${ride.driverLat}, Lng ${ride.driverLng}`;

          const driverPos = [ride.driverLat, ride.driverLng];

          if (!driverMarker) {
            driverMarker = L.marker(driverPos).addTo(map)
              .bindPopup("🚖 Driver is here")
              .openPopup();
          } else {
            driverMarker.setLatLng(driverPos);
          }

          map.setView(driverPos, 15);
        }
      });

      // UPI Pay
      payBtn.addEventListener("click", () => {
        if (!currentRide) return;

        const amount = currentRide.fare || 0;
        const note = `HALORA Ride Payment - ${rideId}`;
        const upiLink = `upi://pay?pa=${HALORA_UPI}&pn=HALORA&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

        window.location.href = upiLink;
      });

      // Mark UPI payment as paid
      paidBtn.addEventListener("click", async () => {
        if (!currentRide) return;

        try {
          await updateDoc(doc(db, "rides", rideId), {
            paymentStatus: "paid"
          });
          alert("Payment marked as paid!");
        } catch (e) {
          alert(e.message);
        }
      });
    }
  </script>
</body>
</html>
