<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HALORA PRO - All India Trips</title>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            padding-bottom: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo span {
            color: #ff6b6b;
        }

        .tagline {
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .page-title {
            font-size: 1.3rem;
            margin-top: 10px;
        }

        .page-title span {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Filter Tabs */
        .filter-tabs {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            background: white;
            margin: 15px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .filter-chip {
            background: #f0f0f0;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Search Box */
        .search-box {
            padding: 0 20px;
            margin: 15px 0;
        }

        .search-box input {
            width: 100%;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: white;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            outline: none;
        }

        /* Price Filter */
        .price-filter {
            margin: 15px 20px;
            background: white;
            border-radius: 20px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .price-filter label {
            font-size: 0.8rem;
            font-weight: bold;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #764ba2;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 12px;
            padding: 0 20px;
            margin: 15px 0;
        }

        .stat-card {
            flex: 1;
            background: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #888;
        }

        /* Trips List */
        .trips-list {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .trip-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.2s;
            cursor: pointer;
        }

        .trip-card:active {
            transform: scale(0.98);
        }

        .trip-img {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .trip-category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .trip-price-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .trip-info {
            padding: 15px;
        }

        .trip-name {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .trip-duration {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 5px;
        }

        .trip-destinations {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 10px;
        }

        .price-row {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }

        .price-tag {
            flex: 1;
            text-align: center;
            padding: 6px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .price-label {
            font-size: 0.6rem;
            color: #888;
        }

        .price-value {
            font-weight: bold;
            font-size: 0.8rem;
        }

        .price-value.budget { color: #28a745; }
        .price-value.mid { color: #ff9800; }
        .price-value.luxury { color: #9c27b0; }

        .book-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        /* Trip Details Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            max-width: 450px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 25px 25px 0 0;
            position: relative;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            padding-right: 30px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .modal-body {
            padding: 20px;
        }

        /* Trip Details Styles */
        .detail-section {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .detail-title {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 1rem;
            font-weight: 500;
            color: #333;
        }

        .detail-highlight {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .price-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .price-detail:last-child {
            border-bottom: none;
        }

        .inclusion-list {
            list-style: none;
            padding: 0;
        }

        .inclusion-list li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .inclusion-list li::before {
            content: "✅";
        }

        .itenary-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .itenary-day {
            background: #667eea;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .itenary-text {
            flex: 1;
            font-size: 0.85rem;
            color: #555;
        }

        .submit-booking {
            background: #28a745;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .booking-form {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .booking-form h4 {
            margin-bottom: 15px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.7rem;
        }
    </style>
</head>

            inclusions: [

    // Additional trips (shortened for brevity - add more as needed)
    const moreTrips = [
        {id:6, name:"Shimla Manali", category:"Hill", duration:"6 Nights / 7 Days", budget:8999, mid:16999, luxury:39999, destinations:"Shimla → Kufri → Manali", photoKeyword:"shimla-hill-station", regionTag:"🏔️ Queen of Hills", bestFor:"Family", fullDescription:"Combine the best of Shimla and Manali on this week-long Himalayan adventure."},
        {id:7, name:"Kashmir Paradise", category:"Popular", duration:"5 Nights / 6 Days", budget:12999, mid:24999, luxury:59999, destinations:"Srinagar → Gulmarg → Pahalgam", photoKeyword:"kashmir-gulmarg-snow", regionTag:"🌸 Heaven", bestFor:"Honeymoon", fullDescription:"Experience the paradise on earth with this Kashmir tour including houseboat stay and gondola ride."},
        {id:8, name:"Leh Ladakh", category:"Popular", duration:"7 Nights / 8 Days", budget:15999, mid:29999, luxury:69999, destinations:"Leh → Pangong → Nubra", photoKeyword:"leh-ladakh-pangong-lake", regionTag:"🏍️ Adventure", bestFor:"Bikers", fullDescription:"The ultimate adventure tour covering high altitude lakes and monasteries."}
    ];

    // Merge all trips
    const allTrips = [...tripsData, ...moreTrips];

    // State variables
    let currentFilter = "all";
    let currentSearch = "";
    let maxPrice = 50000;

    // DOM elements
    const tripsList = document.getElementById("tripsList");
    const searchInput = document.getElementById("searchInput");
    const priceSlider = document.getElementById("priceSlider");
    const priceValueSpan = document.getElementById("priceValue");

    // HD Photo URL generator
    function getPhotoUrl(keyword, width = 400, height = 200) {
        return `https://source.unsplash.com/featured/${width}x${height}/?${keyword},india,travel`;
    }

    // Filter trips
    function getFilteredTrips() {
        let filtered = allTrips;
        if (currentFilter !== "all") {
            filtered = filtered.filter(trip => trip.category === currentFilter);
        }
        if (currentSearch.trim() !== "") {
            const term = currentSearch.toLowerCase();
            filtered = filtered.filter(trip => 
                trip.name.toLowerCase().includes(term) || 
                trip.destinations.toLowerCase().includes(term)
            );
        }
        filtered = filtered.filter(trip => trip.mid <= maxPrice);
        return filtered;
    }

    // Render trips
    function renderTrips() {
        const filtered = getFilteredTrips();
        
        if (filtered.length === 0) {
            tripsList.innerHTML = '<div class="no-results">❌ No trips found. Try adjusting filters!</div>';
            return;
        }

        tripsList.innerHTML = filtered.map(trip => `
            <div class="trip-card">
                <div class="trip-img" style="background-image: url('${getPhotoUrl(trip.photoKeyword)}'); background-size: cover; background-position: center;">
                    <div class="trip-category-badge">${trip.regionTag}</div>
                    <div class="trip-price-badge">${trip.category}</div>
                </div>
                <div class="trip-info">
                    <div class="trip-name">${trip.name}</div>
                    <div class="trip-duration">📅 ${trip.duration}</div>
                    <div class="trip-destinations">📍 ${trip.destinations}</div>
                    <div class="price-row">
                        <div class="price-tag">
                            <div class="price-label">🎒 BUDGET</div>
                            <div class="price-value budget">₹${trip.budget.toLocaleString()}</div>
                        </div>
                        <div class="price-tag">
                            <div class="price-label">⭐ MID-RANGE</div>
                            <div class="price-value mid">₹${trip.mid.toLocaleString()}</div>
                        </div>
                        <div class="price-tag">
                            <div class="price-label">✨ LUXURY</div>
                            <div class="price-value luxury">₹${trip.luxury.toLocaleString()}</div>
                        </div>
                    </div>
                    <button class="book-btn" onclick="showTripDetails(${trip.id})">📅 View Details & Book</button>
                </div>
            </div>
        `).join("");
    }

    // ==================== SHOW TRIP DETAILS FUNCTION ====================
    function showTripDetails(tripId) {
        const trip = allTrips.find(t => t.id === tripId);
        if (!trip) return;

        const modal = document.getElementById("tripDetailModal");
        const modalTitle = document.getElementById("modalTripName");
        const modalBody = document.getElementById("modalBody");

        modalTitle.innerHTML = `${trip.name} - Details`;

        // Generate trip details HTML
        modalBody.innerHTML = `
            <!-- Trip Overview -->
            <div class="detail-section">
                <div class="detail-title">📋 OVERVIEW</div>
                <div class="detail-value">${trip.fullDescription || "Experience the best of " + trip.name + " with this carefully curated tour package."}</div>
            </div>

            <div class="detail-highlight">
                <div class="detail-title">📍 DESTINATIONS COVERED</div>
                <div class="detail-value">${trip.destinations}</div>
            </div>

            <!-- Quick Info -->
            <div class="detail-section">
                <div class="detail-title">⏱️ DURATION</div>
                <div class="detail-value">${trip.duration}</div>
            </div>

            <div class="detail-section">
                <div class="detail-title">🎯 BEST FOR</div>
                <div class="detail-value">${trip.bestFor}</div>
            </div>

            <div class="detail-section">
                <div class="detail-title">📅 BEST TIME TO VISIT</div>
                <div class="detail-value">${trip.bestTime || "October to March"}</div>
            </div>

            <div class="detail-section">
                <div class="detail-title">🗣️ LANGUAGES</div>
                <div class="detail-value">${trip.languages || "English, Hindi"}</div>
            </div>

            <!-- Price Details -->
            <div class="detail-section">
                <div class="detail-title">💰 PRICE BREAKDOWN (Per Person)</div>
                <div class="detail-highlight">
                    <div class="price-detail">
                        <span>🎒 Budget Package</span>
                        <span style="color:#28a745; font-weight:bold;">₹${trip.budget.toLocaleString()}</span>
                    </div>
                    <div class="price-detail">
                        <span>⭐ Mid-Range Package</span>
                        <span style="color:#ff9800; font-weight:bold;">₹${trip.mid.toLocaleString()}</span>
                    </div>
                    <div class="price-detail">
                        <span>✨ Luxury Package</span>
                        <span style="color:#9c27b0; font-weight:bold;">₹${trip.luxury.toLocaleString()}</span>
                    </div>
                </div>
            </div>

            <!-- Inclusions -->
            <div class="detail-section">
                <div class="detail-title">✅ WHAT'S INCLUDED</div>
                <ul class="inclusion-list">
                    ${(trip.inclusions || [
                        "Accommodation as per package",
                        "Daily breakfast",
                        "Sightseeing as per itinerary",
                        "All transfers",
                        "Professional guide"
                    ]).map(item => `<li>${item}</li>`).join('')}
                </ul>
            </div>

            <!-- Exclusions -->
            <div class="detail-section">
                <div class="detail-title">❌ WHAT'S EXCLUDED</div>
                <ul class="inclusion-list">
                    ${(trip.exclusions || [
                        "Flight/train tickets",
                        "Personal expenses",
                        "Travel insurance",
                        "Tips and gratuities"
                    ]).map(item => `<li>${item}</li>`).join('')}
                </ul>
            </div>

            <!-- Itinerary -->
            <div class="detail-section">
                <div class="detail-title">📅 SAMPLE ITINERARY</div>
                ${(trip.itinerary || [
                    { day: 1, text: "Arrival and check-in. Evening free for leisure." },
                    { day: 2, text: "Full day sightseeing tour." },
                    { day: 3, text: "Morning sightseeing. Evening departure." }
                ]).map(item => `
                    <div class="itenary-item">
                        <div class="itenary-day">${item.day}</div>
                        <div class="itenary-text">${item.text}</div>
                    </div>
                `).join('')}
            </div>

            <!-- Booking Form -->
            <div class="booking-form">
                <h4>📞 Book This Trip</h4>
                <input type="text" id="detailName" placeholder="Full Name" required>
                <input type="email" id="detailEmail" placeholder="Email Address" required>
                <input type="tel" id="detailPhone" placeholder="Phone Number" required>
                <input type="number" id="detailTravelers" placeholder="Number of Travelers" min="1" value="1">
                <input type="date" id="detailDate">
                <select id="detailTier">
                    <option value="budget">🎒 Budget - ₹${trip.budget.toLocaleString()}</option>
                    <option value="mid">⭐ Mid-Range - ₹${trip.mid.toLocaleString()}</option>
                    <option value="luxury">✨ Luxury - ₹${trip.luxury.toLocaleString()}</option>
                </select>
                <button class="submit-booking" onclick="confirmBooking(${trip.id})">✅ Confirm Booking</button>
                <p id="bookingConfirmMsg" style="margin-top:12px; text-align:center; color:#28a745;"></p>
            </div>
        `;

        modal.style.display = "flex";
    }

    // Confirm booking function
    function confirmBooking(tripId) {
        const trip = allTrips.find(t => t.id === tripId);
        const name = document.getElementById("detailName")?.value.trim();
        const travelers = document.getElementById("detailTravelers")?.value || 1;
        const tier = document.getElementById("detailTier")?.value;
        
        let price = trip.budget;
        if (tier === "mid") price = trip.mid;
        if (tier === "luxury") price = trip.luxury;
        
        const total = price * parseInt(travelers);

        if (!name) {
            alert("Please enter your name!");
            return;
        }

        const msg = document.getElementById("bookingConfirmMsg");
        msg.innerHTML = `✅ Thank you ${name}! Booking confirmed for ${trip.name}. Total: ₹${total.toLocaleString()}. We'll contact you soon.`;
        
        setTimeout(() => {
            closeModal();
        }, 3000);
    }

    // Close modal
    function closeModal() {
        const modal = document.getElementById("tripDetailModal");
        modal.style.display = "none";
    }

    // Filter chips
    document.querySelectorAll(".filter-chip").forEach(chip => {
        chip.addEventListener("click", () => {
            document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
            chip.classList.add("active");
            currentFilter = chip.getAttribute("data-filter");
            renderTrips();
        });
    });

    // Search
    searchInput.addEventListener("input", (e) => {
        currentSearch = e.target.value;
        renderTrips();
    });

    // Price slider
    priceSlider.addEventListener("input", function() {
        maxPrice = parseInt(this.value);
        priceValueSpan.innerText = maxPrice === 50000 ? "₹50,000+" : `₹${maxPrice.toLocaleString()}`;
        renderTrips();
    });

    // Close modal when clicking X or outside
    document.querySelector(".close-modal")?.addEventListener("click", closeModal);
    window.onclick = function(event) {
        const modal = document.getElementById("tripDetailModal");
        if (event.target === modal) {
            closeModal();
        }
    }

    // Initial render
    renderTrips();
</script>
</body>
</html>
