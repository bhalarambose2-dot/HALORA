<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Where2Go - Budget Trips</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #111;
      padding-bottom: 100px;
    }

    .hero {
      padding: 20px 16px 10px;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 14px;
      opacity: 0.95;
    }

    .search-box {
      margin-top: 18px;
      background: white;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .search-box input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 16px;
      margin-left: 10px;
    }

    .section {
      padding: 18px 16px 0;
    }

    .section h2 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .filters {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 10px;
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      border: 1px solid #ddd;
      background: white;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
      transition: 0.2s;
    }

    .filter-btn.active {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    .trip-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      padding: 18px 16px;
    }

    .trip-card {
      background: white;
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,0.08);
      position: relative;
      transition: 0.25s ease;
    }

    .trip-card:hover {
      transform: translateY(-4px);
    }

    .trip-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .heart-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: rgba(255,255,255,0.9);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .trip-content {
      padding: 18px;
    }

    .trip-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .trip-title {
      font-size: 24px;
      font-weight: 800;
    }

    .budget-badge {
      background: #ecfdf5;
      color: #047857;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .trip-tagline {
      color: #555;
      font-size: 15px;
      margin-bottom: 14px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .meta span {
      background: #f3f4f6;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      color: #374151;
      font-weight: 600;
    }

    .places {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .place-chip {
      border: 1px solid #ddd;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 13px;
      background: #fafafa;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #666;
      font-size: 16px;
      display: none;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      box-shadow: 0 -8px 20px rgba(0,0,0,0.06);
    }

    .nav-item {
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    .nav-item.active {
      color: #4f46e5;
      font-weight: 700;
    }

    @media (min-width: 768px) {
      .trip-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Explore India 🇮🇳</h1>
    <p>Best trips under ₹10,000 per person</p>

    <div class="search-box">
      🔍
      <input type="text" id="searchInput" placeholder="Search destinations like Goa, Jaipur..." />
    </div>
  </div>

  <div class="section">
    <h2>Where You Should Go Next?</h2>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="All">All</button>
      <button class="filter-btn" data-filter="Hill">Hill</button>
      <button class="filter-btn" data-filter="Religious">Religious</button>
      <button class="filter-btn" data-filter="Couple">Couple</button>
      <button class="filter-btn" data-filter="Family">Family</button>
      <button class="filter-btn" data-filter="Beach">Beach</button>
      <button class="filter-btn" data-filter="Heritage">Heritage</button>
    </div>
  </div>

  <div class="trip-grid" id="tripGrid"></div>
  <div class="empty-state" id="emptyState">No destinations found 😕</div>

  <div class="bottom-nav">
    <div class="nav-item active">🏠<br>Home</div>
    <div class="nav-item">🧳<br>Trips</div>
    <div class="nav-item">🔍<br>Explore</div>
    <div class="nav-item">🎁<br>Offers</div>
  </div>

  <script>
    const destinations = [
      {
        name: "Jaipur",
        tagline: "Royal Pink City",
        budget: "₹4,000 - ₹8,500",
        days: "2-3 Days",
        bestTime: "Oct - Mar",
        category: ["Heritage", "Family", "Couple"],
        places: ["Hawa Mahal", "Amer Fort", "Nahargarh"],
        image: "https://images.unsplash.com/photo-1599661046827-dacde6976548?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Udaipur",
        tagline: "City of Lakes",
        budget: "₹5,000 - ₹9,500",
        days: "2-3 Days",
        bestTime: "Oct - Mar",
        category: ["Couple", "Family", "Heritage"],
        places: ["Lake Pichola", "City Palace", "Fateh Sagar"],
        image: "https://images.unsplash.com/photo-1609948543911-c6d53d58b4e2?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Goa",
        tagline: "Beaches & Nightlife",
        budget: "₹8,000 - ₹10,000",
        days: "3-4 Days",
        bestTime: "Nov - Feb",
        category: ["Beach", "Couple", "Friends"],
        places: ["Baga", "Anjuna", "Aguada Fort"],
        image: "https://images.unsplash.com/photo-1518509562904-e7ef99cdcc86?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Rishikesh",
        tagline: "Adventure & Peace",
        budget: "₹4,500 - ₹9,500",
        days: "2-3 Days",
        bestTime: "Sep - Apr",
        category: ["Religious", "Family", "Adventure"],
        places: ["Laxman Jhula", "Ganga Aarti", "Rafting"],
        image: "https://images.unsplash.com/photo-1626621341517-bbf3d9990c16?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Varanasi",
        tagline: "Spiritual Soul of India",
        budget: "₹4,000 - ₹8,500",
        days: "2-3 Days",
        bestTime: "Oct - Mar",
        category: ["Religious", "Family"],
        places: ["Kashi Vishwanath", "Assi Ghat", "Sarnath"],
        image: "https://images.unsplash.com/photo-1561361058-c24cecae35ca?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Amritsar",
        tagline: "Faith, Food & History",
        budget: "₹5,000 - ₹9,500",
        days: "2-3 Days",
        bestTime: "Oct - Mar",
        category: ["Religious", "Family", "Heritage"],
        places: ["Golden Temple", "Wagah Border", "Jallianwala"],
        image: "https://images.unsplash.com/photo-1583391733981-84959f2c76b3?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Shimla",
        tagline: "Classic Hill Escape",
        budget: "₹7,000 - ₹10,000",
        days: "3-4 Days",
        bestTime: "Mar - Jun",
        category: ["Hill", "Couple", "Family"],
        places: ["Mall Road", "Kufri", "Jakhoo Temple"],
        image: "https://images.unsplash.com/photo-1622308644420-b20142dc993c?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Manali",
        tagline: "Snow & Mountain Vibes",
        budget: "₹8,000 - ₹10,000",
        days: "3-4 Days",
        bestTime: "Oct - Feb",
        category: ["Hill", "Couple", "Adventure"],
        places: ["Solang Valley", "Old Manali", "Atal Tunnel"],
        image: "https://images.unsplash.com/photo-1626621341517-bbf3d9990c16?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Mount Abu",
        tagline: "Rajasthan’s Cool Hill Station",
        budget: "₹4,500 - ₹9,000",
        days: "2-3 Days",
        bestTime: "Oct - Mar",
        category: ["Hill", "Family", "Couple"],
        places: ["Nakki Lake", "Guru Shikhar", "Sunset Point"],
        image: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"
      },
      {
        name: "Ayodhya",
        tagline: "Sacred City of Lord Ram",
        budget: "₹4,000 - ₹8,500",
        days: "2-3 Days",
        bestTime: "Oct - Mar",
        category: ["Religious", "Family"],
        places: ["Ram Mandir", "Hanuman Garhi", "Saryu Ghat"],
        image: "https://images.unsplash.com/photo-1548013146-72479768bada?auto=format&fit=crop&w=1200&q=80"
      }
    ];

    const tripGrid = document.getElementById("tripGrid");
    const searchInput = document.getElementById("searchInput");
    const filterButtons = document.querySelectorAll(".filter-btn");
    const emptyState = document.getElementById("emptyState");

    let currentFilter = "All";

    function renderTrips() {
      const searchValue = searchInput.value.toLowerCase();

      const filtered = destinations.filter(dest => {
        const matchesSearch =
          dest.name.toLowerCase().includes(searchValue) ||
          dest.tagline.toLowerCase().includes(searchValue) ||
          dest.places.join(" ").toLowerCase().includes(searchValue);

        const matchesFilter =
          currentFilter === "All" || dest.category.includes(currentFilter);

        return matchesSearch && matchesFilter;
      });

      tripGrid.innerHTML = "";

      if (filtered.length === 0) {
        emptyState.style.display = "block";
        return;
      } else {
        emptyState.style.display = "none";
      }

      filtered.forEach(dest => {
        const card = document.createElement("div");
        card.className = "trip-card";

        card.innerHTML = `
          <img class="trip-img" src="${dest.image}" alt="${dest.name}">
          <button class="heart-btn">♡</button>
          <div class="trip-content">
            <div class="trip-title-row">
              <div class="trip-title">${dest.name}</div>
              <div class="budget-badge">${dest.budget}</div>
            </div>
            <div class="trip-tagline">${dest.tagline}</div>

            <div class="meta">
              <span>🗓 ${dest.days}</span>
              <span>🌤 ${dest.bestTime}</span>
            </div>

            <div class="places">
              ${dest.places.map(place => `<div class="place-chip">${place}</div>`).join("")}
            </div>
          </div>
        `;

        const heartBtn = card.querySelector(".heart-btn");
        heartBtn.addEventListener("click", () => {
          heartBtn.textContent = heartBtn.textContent === "♡" ? "❤️" : "♡";
        });

        tripGrid.appendChild(card);
      });
    }

    filterButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelector(".filter-btn.active").classList.remove("active");
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderTrips();
      });
    });

    searchInput.addEventListener("input", renderTrips);

    renderTrips();
  </script>

</body>
</html>
