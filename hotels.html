<!DOCTYPE html>
<html>
<head>
  <title>Hotels</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="topbar">
  <div class="logo">Hotels</div>
  <a href="./dashboard.html" class="logout-btn">Back</a>
</header>

<main class="container">

  <h2 class="section-title">Top Hotels</h2>

  <div class="scroll-row">

    <div class="trip-card">
      <img src="https://source.unsplash.com/300x200/?hotel" style="border-radius:16px;margin-bottom:12px;">
      <h3>Luxury Palace</h3>
      <p>5 Star • Pool • Free Breakfast</p>
      <div class="trip-price">₹2999 / night</div>
      <button>Book Now</button>
    </div>

    <div class="trip-card">
      <img src="https://source.unsplash.com/300x200/?resort" style="border-radius:16px;margin-bottom:12px;">
      <h3>Beach Resort</h3>
      <p>Sea View • AC Rooms • WiFi</p>
      <div class="trip-price">₹3999 / night</div>
      <button>Book Now</button>
    </div>

    <div class="trip-card">
      <img src="https://source.unsplash.com/300x200/?hotel-room" style="border-radius:16px;margin-bottom:12px;">
      <h3>Budget Stay</h3>
      <p>Affordable • Clean Rooms</p>
      <div class="trip-price">₹999 / night</div>
      <button>Book Now</button>
    </div>

  </div>

</main>
</body>
</html>
