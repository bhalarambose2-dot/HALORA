<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HALORA RIDE</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" type="image/png" href="./assets/halora-icon.png">
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand-wrap">
      <div class="logo">HALORA RIDE</div>
    </div>

    <a class="logout-btn" href="./signup.html">Get Started</a>
  </header>

  <!-- ONLY 3D HERO -->
  <main class="home-center">
    <section class="only-hero-card">

      <div class="video-card">
        <div class="video-badge">HALORA </div>

        <div class="halora-3d-box">
          <div class="glow-ring ring1"></div>
          <div class="glow-ring ring2"></div>
          <div class="glow-ring ring3"></div>

          <div class="logo-orb"></div>

          <div class="floating-logo">
            <span>H</span>
          </div>

          <h1 class="halora-animated-text">HALORA RIDE</h1>
          <p class="halora-sub">Smart Ride Booking Platform</p>

          <a class="main-btn green-btn center-btn" href="./signup.html">Get Started</a>
        </div>
      </div>

    </section>
  </main>
