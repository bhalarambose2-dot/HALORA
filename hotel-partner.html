<!DOCTYPE html>
<html>
<head>
  <title>Hotel Partner - HALORA</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header class="topbar">
    <div class="logo">Hotel Partner</div>
    <a href="./partner.html" class="logout-btn">Back</a>
  </header>

  <main class="container">
    <div class="card">
      <h2>Apply as Hotel Owner</h2>

      <input type="text" id="hotelName" placeholder="Hotel Name"><br><br>
      <input type="text" id="hotelCity" placeholder="City"><br><br>
      <input type="text" id="hotelPhone" placeholder="Contact Number"><br><br>

      <button class="main-btn" onclick="submitPartnerForm('hotel')">Submit</button>
    </div>
  </main>

  <script type="module" src="./partner.js"></script>
</body>
</html>
