<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - HALORA RIDE</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">HALORA RIDE</div>
    <a class="logout-btn" href="login.html">Login</a>
  </header>

  <main class="container">
    <section class="card">
      <h2>Create Account</h2>
      <input id="name" type="text" placeholder="Full name" />
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <select id="role">
        <option value="">Select role</option>
        <option value="customer">Customer</option>
        <option value="driver">Driver</option>
      </select>
      <button class="main-btn" onclick="signupUser()">Signup</button>
      <br /><br />
      <p class="muted">Already have an account? <a class="link" href="login.html">Login</a></p>
    </section>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
