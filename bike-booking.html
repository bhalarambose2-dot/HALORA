<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Book Ride – बुक राइड</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
        }

        body {
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* Card */
        .ride-card {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Header with back */
        .header {
            display: flex;
            align-items: center;
            padding: 20px 20px 8px 20px;
            gap: 16px;
        }

        .back-btn {
            font-size: 24px;
            background: #f3f4f6;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            color: #1f2937;
            transition: 0.2s;
        }

        .back-btn:active {
            background: #e5e7eb;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #111827;
        }

        .title small {
            font-size: 14px;
            font-weight: normal;
            color: #6b7280;
            display: block;
        }

        /* content padding */
        .content {
            padding: 8px 20px 24px 20px;
        }

        .tagline {
            background: #fef9e3;
            padding: 12px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #92400e;
            margin: 8px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* service buttons */
        .service-row {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .service-btn {
            flex: 1;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 60px;
            padding: 12px 0;
            text-align: center;
            font-weight: 600;
            font-size: 16px;
            color: #374151;
            transition: 0.2s;
            cursor: pointer;
        }

        .service-btn.active {
            background: #000;
            border-color: #000;
            color: white;
        }

        /* location blocks */
        .location-block {
            margin-bottom: 24px;
        }

        .loc-label {
            font-weight: 600;
            font-size: 15px;
            color: #1f2937;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .loc-actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .sec-btn {
            flex: 1;
            background: #f3f4f6;
            border: none;
            border-radius: 40px;
            padding: 12px 0;
            font-weight: 500;
            font-size: 14px;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .sec-btn:active {
            background: #e5e7eb;
        }

        .map-placeholder {
            background: #eef2ff;
            height: 120px;
            border-radius: 24px;
            margin: 16px 0 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-size: 13px;
            border: 1px dashed #cbd5e1;
        }

        .bottom-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
        }

        .bottom-btn {
            flex: 1;
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 60px;
            padding: 12px 0;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
        }

        .bottom-btn.primary {
            background: #000;
            border: none;
            color: white;
        }

        hr {
            margin: 16px 0;
            border: 0.5px solid #f3f4f6;
        }

        .note {
            font-size: 11px;
            color: #9ca3af;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="ride-card">
    <div class="header">
        <div class="back-btn" id="backBtn">←</div>
        <div class="title">
            🚖 बुक राइड <small>Book Ride</small>
        </div>
    </div>

    <div class="content">
        <div class="tagline">
            ⚡ मिनटों में राइड | Ride in minutes
        </div>

        <!-- Service selection -->
        <div class="service-row">
            <div class="service-btn" data-service="bike">🛵 Bike</div>
            <div class="service-btn" data-service="auto">🛺 Auto</div>
            <div class="service-btn active" data-service="taxi">🚕 Taxi</div>
        </div>

        <!-- Pickup -->
        <div class="location-block">
            <div class="loc-label">📍 पिकअप लोकेशन <span style="font-weight:normal">(Pickup)</span></div>
            <div class="loc-actions">
                <button class="sec-btn" id="setPickupBtn">📍 सेट पिकअप</button>
            </div>
        </div>

        <!-- Drop -->
        <div class="location-block">
            <div class="loc-label">🏁 ड्रॉप लोकेशन <span style="font-weight:normal">(Drop)</span></div>
            <div class="loc-actions">
                <button class="sec-btn" id="setDropBtn">🏁 सेट ड्रॉप</button>
            </div>
        </div>

        <!-- map simulation -->
        <div class="map-placeholder" id="mapHint">
            🗺️ मैप पर टैप करें या बटन use करें<br>Tap map or use buttons
        </div>

        <!-- current selection info -->
        <div style="font-size:13px; background:#fafafa; border-radius:16px; padding:8px 12px; margin:8px 0;" id="locationStatus">
            ⚠️ पिकअप और ड्रॉप लोकेशन सेट करें
        </div>

        <div class="bottom-actions">
            <button class="bottom-btn" id="useMyLocationBtn">📍 मेरी लोकेशन</button>
            <button class="bottom-btn" id="clearBtn">🗑️ क्लियर</button>
            <button class="bottom-btn primary" id="bookNowBtn">✅ बुक करें</button>
        </div>
        <div class="note">
            * मैप पर टैप करें या सेट बटन से लोकेशन चुनें
        </div>
    </div>
</div>

<script>
    // simple state
    let pickup = null;
    let drop = null;
    let selectedService = "taxi";   // bike, auto, taxi

    // DOM elements
    const pickupBtn = document.getElementById('setPickupBtn');
    const dropBtn = document.getElementById('setDropBtn');
    const useLocationBtn = document.getElementById('useMyLocationBtn');
    const clearBtn = document.getElementById('clearBtn');
    const bookBtn = document.getElementById('bookNowBtn');
    const statusDiv = document.getElementById('locationStatus');
    const mapHint = document.getElementById('mapHint');
    const serviceBtns = document.querySelectorAll('.service-btn');

    // helper to update UI
    function updateStatus() {
        let pickupText = pickup ? pickup : "❌ नहीं चुना";
        let dropText = drop ? drop : "❌ नहीं चुना";
        statusDiv.innerHTML = `📍 पिकअप: ${pickupText}<br>🏁 ड्रॉप: ${dropText}<br>🚖 सेवा: ${selectedService.toUpperCase()}`;
        if(pickup && drop) {
            statusDiv.style.background = "#e6f7e6";
        } else {
            statusDiv.style.background = "#fafafa";
        }
    }

    // mock set location (simulate map selection)
    function setPickup() {
        let mockLoc = "सीपी, दिल्ली (CP, Delhi)";
        pickup = mockLoc;
        updateStatus();
        mapHint.innerHTML = "📍 पिकअप सेट: " + mockLoc + "<br>🗺️ ड्रॉप के लिए मैप या सेट ड्रॉप बटन दबाएँ";
    }

    function setDrop() {
        let mockLoc = "नोएडा सेक्टर 62 (Noida Sec 62)";
        drop = mockLoc;
        updateStatus();
        if(pickup) {
            mapHint.innerHTML = "✅ पिकअप: " + pickup + "<br>✅ ड्रॉप: " + drop + "<br>🎉 अब बुक करें";
        } else {
            mapHint.innerHTML = "🏁 ड्रॉप सेट: " + mockLoc + "<br>📍 पहले पिकअप सेट करें";
        }
    }

    function useMyLocation() {
        let userLoc = "आपकी करंट लोकेशन (Your current location)";
        if(!pickup) {
            pickup = userLoc;
            updateStatus();
            mapHint.innerHTML = "📍 मेरी लोकेशन पिकअप के तौर पर सेट: " + userLoc;
        } else {
            // if pickup already exists, ask or replace? Better to replace pickup.
            if(confirm("पिकअप पहले से सेट है। क्या आप इसे मेरी लोकेशन से बदलना चाहते हैं?")) {
                pickup = userLoc;
                updateStatus();
                mapHint.innerHTML = "📍 पिकअप अपडेट: " + userLoc;
            }
        }
    }

    function clearAll() {
        pickup = null;
        drop = null;
        updateStatus();
        mapHint.innerHTML = "🗺️ सब क्लियर। पिकअप और ड्रॉप फिर से सेट करें।\nTap map or use buttons";
    }

    function bookRide() {
        if(!pickup || !drop) {
            alert("⚠️ कृपया पिकअप और ड्रॉप लोकेशन दोनों सेट करें!\nPlease set both pickup & drop.");
            return;
        }
        alert(`🚖 राइड बुक हो गई! \nसेवा: ${selectedService}\nपिकअप: ${pickup}\nड्रॉप: ${drop}\n\nआपकी राइड जल्द आ रही है।`);
    }

    // service selection
    serviceBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            serviceBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedService = btn.getAttribute('data-service');
            updateStatus();
        });
    });

    // events
    pickupBtn.addEventListener('click', setPickup);
    dropBtn.addEventListener('click', setDrop);
    useLocationBtn.addEventListener('click', useMyLocation);
    clearBtn.addEventListener('click', clearAll);
    bookBtn.addEventListener('click', bookRide);

    // optional map click simulation (click on map placeholder)
    mapHint.addEventListener('click', (e) => {
        let msg = "🗺️ मैप पर क्लिक किया!\nक्या सेट करना है?\n1 - पिकअप\n2 - ड्रॉप";
        let choice = prompt(msg + "\n\n1 या 2 लिखें:");
        if(choice === "1") setPickup();
        else if(choice === "2") setDrop();
        else alert("कृपया 1 (पिकअप) या 2 (ड्रॉप) चुनें");
    });

    // back button simulation
    document.getElementById('backBtn').addEventListener('click', () => {
        alert("← पीछे जाएँ (Back) – आमतौर पर होम स्क्रीन पर ले जाएगा");
    });

    // initial status
    updateStatus();
</script>
</body>
</html>
