<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HALORA Trips</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:#fff;
}

.header{
  text-align:center;
  padding:15px;
  background:#0f172a;
  font-size:20px;
}

.search-box{
  margin:15px;
}
.search-box input{
  width:100%;
  padding:12px;
  border-radius:25px;
  border:none;
  background:#111827;
  color:#fff;
}

.trips{
  padding:10px;
}

.card{
  background:#111827;
  margin-bottom:15px;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.btn{
  background:#ff7a00;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  color:#fff;
  margin-top:10px;
}

#bookingPopup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#111827;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

.popup-box input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="header">✈️ HALORA Trips</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search trips...">
</div>

<div class="trips" id="tripList"></div>

<!-- POPUP -->
<div id="bookingPopup">
  <div class="popup-box">
    <h3 id="tripName"></h3>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <input type="text" id="address" placeholder="Address">

    <button class="btn" onclick="confirmBooking()">Confirm</button>
    <button class="btn" onclick="closePopup()">Cancel</button>
  </div>
</div>

<!-- ✅ ONLY THIS JS LINK -->
<script src="trips.js"></script>

</body>
</html>
