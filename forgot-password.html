<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HALORA - Forgot Password</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-box">
    <div class="logo-box">H</div>
    <h2>Forgot Password</h2>
    <p class="sub-text">Enter your email to receive a password reset link</p>

    <input type="email" id="resetEmail" placeholder="Enter your email" />

    <button class="btn" onclick="resetPassword()">Send Reset Link</button>

    <p class="auth-link">
      Remember password? <a href="login.html">Back to Login</a>
    </p>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
