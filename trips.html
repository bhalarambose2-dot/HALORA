<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HALORA PRO - All India Trips</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            padding-bottom: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            padding: 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .logo span {
            color: #ff6b6b;
        }

        .tagline {
            font-size: 0.65rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .page-title {
            font-size: 1.3rem;
            margin-top: 10px;
        }

        .page-title span {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* Filter Tabs */
        .filter-tabs {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            background: white;
            margin: 15px;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .filter-chip {
            background: #f0f0f0;
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Search Box */
        .search-box {
            padding: 0 20px;
            margin: 15px 0;
        }

        .search-box input {
            width: 100%;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: white;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            outline: none;
        }

        /* Price Filter */
        .price-filter {
            margin: 15px 20px;
            background: white;
            border-radius: 20px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .price-filter label {
            font-size: 0.8rem;
            font-weight: bold;
        }

        input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #764ba2;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 12px;
            padding: 0 20px;
            margin: 15px 0;
        }

        .stat-card {
            flex: 1;
            background: white;
            padding: 12px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff6b6b;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #888;
        }

        /* Trips List */
        .trips-list {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .trip-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: all 0.2s;
            cursor: pointer;
        }

        .trip-card:active {
            transform: scale(0.98);
        }

        .trip-img {
            height: 160px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .trip-category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .trip-price-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .trip-info {
            padding: 15px;
        }

        .trip-name {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .trip-duration {
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 5px;
        }

        .trip-destinations {
            font-size: 0.75rem;
            color: #555;
            margin-bottom: 10px;
        }

        .price-row {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }

        .price-tag {
            flex: 1;
            text-align: center;
            padding: 6px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .price-label {
            font-size: 0.6rem;
            color: #888;
        }

        .price-value {
            font-weight: bold;
            font-size: 0.8rem;
        }

        .price-value.budget { color: #28a745; }
        .price-value.mid { color: #ff9800; }
        .price-value.luxury { color: #9c27b0; }

        .book-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }

        /* Trip Details Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            max-width: 450px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 25px 25px 0 0;
            position: relative;
        }

        .modal-header h2 {
            font-size: 1.2rem;
            padding-right: 30px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .modal-body {
            padding: 20px;
        }

        /* Trip Details Styles */
        .detail-section {
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        .detail-title {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-size: 1rem;
            font-weight: 500;
            color: #333;
        }

        .detail-highlight {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .price-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .price-detail:last-child {
            border-bottom: none;
        }

        .inclusion-list {
            list-style: none;
            padding: 0;
        }

        .inclusion-list li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .inclusion-list li::before {
            content: "✅";
        }

        .itenary-item {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .itenary-day {
            background: #667eea;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .itenary-text {
            flex: 1;
            font-size: 0.85rem;
            color: #555;
        }

        .submit-booking {
            background: #28a745;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .booking-form {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .booking-form h4 {
            margin-bottom: 15px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #888;
            font-size: 0.7rem;
        }
    </style>
</head>
