<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:Poppins;
background:linear-gradient(#0b0f19,#121a2f);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#131b2d;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:8px;
border:none;
border-radius:8px;
background:#1f2a44;
color:white;
}

button{
padding:12px;
width:95%;
background:#00c853;
border:none;
border-radius:10px;
color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>KYC Form</h2>

<form onsubmit="submitForm(event)">

<input id="name" placeholder="Name" required>
<input id="phone" placeholder="Phone" required>
<input id="address" placeholder="Address" required>
<input id="aadhaar" placeholder="Aadhaar" required>
<input id="pan" placeholder="PAN" required>

<div id="extra"></div>

<button>Continue</button>
</form>
</div>

<script type="module">
import { db } from "./js/firebase-config.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const type=localStorage.getItem("partnerType");

if(type==="driver"){
extra.innerHTML=`<input id="dl" placeholder="DL" required>`;
}
if(type==="hotel"){
extra.innerHTML=`<input id="hotel" placeholder="License" required>`;
}

window.submitForm=async(e)=>{
e.preventDefault();

const docRef=await addDoc(collection(db,"partners"),{
name:name.value,
phone:phone.value,
address:address.value,
aadhaar:aadhaar.value,
pan:pan.value,
partnerType:type,
plan:localStorage.getItem("planPrice"),
status:"KYC Done",
createdAt:Date.now()
});

localStorage.setItem("partnerId",docRef.id);
window.location="prime-payment.html";
};
</script>

</body>
</html>
