<!DOCTYPE html>
<html>
<head>
  <title>Partner</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="topbar">
    <div class="logo">Become Partner</div>
    <a href="./dashboard.html" class="logout-btn">Back</a>
  </header>

  <main class="container">

    <h2 class="section-title">Earn with HALORA</h2>

    <!-- 🔥 Prime Plan Banner -->
    <div style="background:gold; padding:15px; border-radius:12px; margin-bottom:20px; color:black; text-align:center;">
      <h3>🚀 Prime Partner Plan - ₹299 Only</h3>
      <p>Mandatory for all partners • Earn More • Get Verified</p>
    </div>

    <div class="partner-grid">

      <!-- Bike Rider -->
      <div class="partner-card">
        <div class="left">
          <div class="icon">🏍️</div>
          <div>
            <h4>Bike Rider</h4>
            <p>Earn per ride</p>
          </div>
        </div>
        <button class="apply-btn" onclick="openPartner('driver')">
          Apply & Get Prime ₹299
        </button>
      </div>

      <!-- Hotel Owner -->
      <div class="partner-card">
        <div class="left">
          <div class="icon">🏨</div>
          <div>
            <h4>Hotel Owner</h4>
            <p>List your hotel</p>
          </div>
        </div>
        <button class="apply-btn" onclick="openPartner('hotel')">
          Apply & Get Prime ₹299
        </button>
      </div>

      <!-- Trip Agent -->
      <div class="partner-card">
        <div class="left">
          <div class="icon">🧳</div>
          <div>
            <h4>Trip Agent</h4>
            <p>Sell packages</p>
          </div>
        </div>
        <button class="apply-btn" onclick="openPartner('trip')">
          Apply & Get Prime ₹299
        </button>
      </div>

    </div>

  </main>

  <script>
    function openPartner(type) {

      // 🔥 Save selected partner type
      localStorage.setItem("partnerType", type);

      // 👉 Redirect to payment page
      window.location.href = "prime-payment.html";
    }
  </script>

</body>
</html>
