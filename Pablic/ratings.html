<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ratings - HALORA</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">RATE RIDE</div>
    <a class="logout-btn" href="customer.html">Back</a>
  </header>

  <main class="container">
    <section class="card">
      <h2>Rate Your Last Ride</h2>
      <input id="rating" type="number" min="1" max="5" placeholder="Enter rating 1-5" />
      <input id="review" type="text" placeholder="Write review" />
      <button class="main-btn" onclick="submitRating()">Submit Rating</button>
    </section>
  </main>

  <script type="module" src="js/ratings.js"></script>
</body>
</html>
